body:
  text: 卷三陰虛論太極動而生陽靜而生陰陽動則變陰動則合而生五行各稟其性惟人得備形氣之正所受天地氣生陽氣為氣陰氣為血身中之神元氣之根根於內者名曰神機根於外者名曰氣立與天地參而在氣交之中隨天地之氣以升降浮沉陽實陰虛氣常有餘血常不足所與天地日月四時盈虛並同陰平陽秘形志以寧陽本在外為陰之衛陰本在內為陽之守性惑物感精神外馳嗜欲無節陰氣耗散陽無所附遂至病作惡寒非寒惡熱非熱證類實邪此實陰虛發熱熱乃火動有君相之別相火所謂龍雷天火君火所謂人火暑熱故火乃有二備於六氣以名而言形氣相生配於五行名曰君火以位而言生於虛無守位稟命目動而見謂之相火天以此火而為陽氣以生萬物人以此火以生一身道氣衝和助我元氣元氣不足相火獨盛火與元氣不能兩立一勝一負乃致陰虛火動五亂俱施金危木盛土困水橫迭相為制母子背違陽強不密陰氣乃離府藏經絡偏實偏虛遂失其正邪悉由矣虛邪外入實邪內起取經治正補瀉所宜肝主疏泄腎司閉藏肝為相火有瀉無補腎為真水有補無瀉水火變病虛實所以夏月陽極其本陽虛水多火少陰實陽虛甚至傷寒病未傳變初治責虛傷寒祛寒助陽暑病清暑益氣虛者十補勿一泄之卻邪養正平則守常陽動陰靜五行之機根本化源由乎水土水為物元土為物母人能自存益其根本遞相濟養是為和平生化不已若交互克伐變亂失常鬱而無伸甚而無制造化息矣腸澼下血夫飲食不節起居不時則陰受之陰受之則入五臟為䐜滿為飧泄久為腸澼腸澼者水穀與血另作一派如泄桶湧出又有藏毒乃風暑熱蘊毒臟腑而下瘀血腸風乃風邪入臟而下清血糞前為近血糞後為遠血宜升補陽明不可純用寒涼須知寒因熱用之法酒浸炒芩連槐花升麻秦艽白朮四物歸脾之類果是風邪加荊芥防風邪減收澀用烏梅地榆溫散加炒乾姜治脾腎要知燥潤得宜大抵人之虛多是陰虛火動脾胃衰弱真陰者水也脾胃者土也土雖喜燥然太燥則草木枯槁水雖喜潤然太潤則草木濕爛是以補脾胃及補腎之劑務在燥潤得宜隨病加減為妙經論要旨氣之升降天地之更相為用也天氣下降氣流於地地氣上升氣騰於天故高下相召升降相因出入廢則神機化滅升降息則氣立孤危出入謂喘息也升降謂化氣也夫毛羽倮鱗介及飛走蚑行皆生氣根於身中以為動靜之主故曰神機然金玉土石溶延草木皆生氣根於外假氣以成立主持故曰氣立故非出入則無以生長至壯老非升降則無以生長化收藏是以升降出入無器不有包藏生氣皆謂生化之氣觸物然夫竅橫者皆有出入去來之氣竅豎者皆有陰陽升降之氣往復於中何以明之則壁窗戶間兩面同之皆承來氣衝擊於人是出入氣也夫陽升則井寒陰升則水暖以物投井及葉墜空中翩翩不疾皆升氣所礙也虛管溉滿捻上懸之水固不泄為無升氣而不能降也空瓶小口頓溉不入為氣不入而不能入由是觀之升無不降降無不升無出則不入無入則不出有識無識有情無情去出入升降而云存者未之有也故曰升降出入無器不有元氣凝空水始生也赤氣炫空火始生也蒼氣浮空木始生也素氣橫空金始生也黃氣際空土始生也人生十歲五臟始定血氣已通其氣在下故好走二十歲血氣已盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五藏六府皆大盛以平定腠理始疏榮華頹落發頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始減目始不明六十歲心氣衰苦憂思血氣懈惰故好臥也七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智夫人之生惟精與氣為毛骨血肉者精也為呼吸冷熱者氣也然人為萬物之靈非木石比故其精其氣莫不各有神焉精之神為之魄氣之神為之魂耳目所以視聽者魄之為也此心之所以思者魂之為也合魂與魄乃陰陽之神而理實貫具乎其中惟其魂魄之中有理具焉是以靜則為仁義禮智之性動則為惻隱羞惡恭敬是非之情胥此出也夫虛靈不昧曰人只有個魂與魄人之記事自然記得底是魄如會任地搜索思量底是魂日長一日魄是稟得來合下任的如月之光彩是魂無光彩處是魄魄亦有光但是藏在裡面又曰氣之呼吸為魂耳目精明是藏在裡面如今人聽得事何嘗是去聽他乃是他自入耳邊來因透諸心便記得此是魄魄主受納魂主經營故魄屬陰魂屬陽陰凝靜陽散發人之面備耳目口鼻舌猶天之五行也腹備肝肺脾腎心猶地之五行也耳鼻縱而孔竅凹靜而陰也目口橫而睛舌凸動而陽也腎屬耳肺屬鼻反動而為陽肝屬目脾屬口反靜而為陰心舌居動靜之間而心聲形於舌舌音發於心是心舌者又為一身之主也然頂圓而額方天地定位也鼻岳聳而口淵深山澤通氣也眼外耀而舌下津水火不相射也喉出響而耳收聲雷風相薄也此皆與天地造化相肖也夫天即氣地即血天包地氣載血今人骨肉藏府皆血也魄也神機靈運皆氣也魂也人死乃魂去魄存氣散血尚聚也是以貴養氣氣降氣轉耗也人身之天為首而一身之氣自流行貫通脈絡相連如耳目口鼻為氣之出入皆在於首而其為氣必自下而上故目如日月而五藏皆屬之豈非自地而起乎天包地地之上下有天天之氣循環轉旋無一息之停止如人身自腹以上為天腹之下為地人身之氣自足之湧泉而起至於頭頂又降而下循環不窮然謂之陰陽亦以其上下言之爾天氣在地下者為陰在地上者為陽其為形雖有陰陽之殊其為氣則一也營者水穀之精氣和調於五藏灑陳於六府乃能入於脈故循脈上下貫五藏絡六府也衛者水穀之悍氣其氣慓疾滑利故循皮膚之中分肉之間熏於育膜散於胸腹不能入於脈也人有精氣津液血脈以為一氣乃辨為六名其所以然者兩神相搏合而成形常先身生是為精上焦開發宣五穀味熏膚充身澤毛若霧露之溉是為氣腠理發泄汗出溱溱是為津谷入氣滿淖澤注於骨骨屬曲伸泄澤補益腦髓皮膚潤澤是為液中焦受氣取汁變化而赤是為血壅遏營氣令無所避是為脈十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而諸陰脈皆至頸胸中而還獨諸陽脈皆上至頭耳故人面獨耐寒也婦人無須者衝任二脈皆起於胞中上循腹裡為經絡之海不足於血以其數脫血衝任之脈不營於唇口故須不生有天宦者此天之所不足也其衝任不盛宗筋不成有氣無血唇口不營故須不生九竅者肝開竅於目心開竅於耳肺開竅於鼻脾開竅於口腎開竅於二陰胃者水穀之海衝脈者十二經脈之海膻中者為氣之海腦為髓之海形與氣任則壽不相任則夭皮與肉裹則壽不相裹則夭血氣筋絡勝形則壽不勝形則夭形充而皮膚緩者則壽形充而脈小以弱者氣衰氣衰則危矣形充而顴不起者骨小骨小則夭矣形充而大肉䐃堅分理者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危太陽常多血少氣少陽常少血多氣陽明常多血多氣太陰常多氣少血少陰常少血多氣厥陰常多血少氣五運生病者謂諸風掉眩皆屬於肝諸痛癢瘡皆屬於心諸濕腫滿皆屬於脾諸氣膹郁皆屬於肺諸寒收引皆屬於腎六氣為病者謂諸暴強直支痛軟戾裡急筋縮皆屬於風厥陰風木乃肝膽之氣也諸病喘嘔吐酸暴注急迫轉筋小便渾濁腹滿䐜脹鼓之如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼻衄血溢血泄淋閉身熱惡寒戰慄驚癇悲笑譫妄衄衊血汙皆屬於熱少陰君火之熱乃心小腸之氣也諸痙強直積飲痞膈中滿霍亂吐下體重跗腫肉如泥按之不起皆屬於濕太陰濕土乃脾胃之氣也諸熱瞀瘛暴喑冒昧躁擾狂越罵詈驚駭跗腫痠疼氣熱上衝禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴耳聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死皆屬於火少陽相火之熱乃心包三焦之氣也諸澀枯涸幹勁皴揭皆屬於燥陽明燥金乃肺大腸之氣也諸病泄利所出水液澄沏清冷癥瘕㿗疝堅痞腹滿急滿下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒乃腎與膀胱之氣也六極者盡力謀慮勞傷乎肝應乎筋極曲運神機勞傷乎心應乎脈極意外過思勞傷乎脾應乎肉極預事而憂勞傷乎肺應乎氣極矜持志節勞傷乎腎應乎骨極此因五勞應乎五極者也然精極者五藏六府之氣皆衰形體皆極眼視無明齒焦發落體重耳聾行履不正邪氣通於六府厥於五藏故成精極中熱消癉則便寒寒中之屬則便熱胃中熱則消穀令人善飢臍以上皮熱腸中熱則出黃如糜臍以下皮熱胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢少腹痛脹氣海有餘者胸中悗息面赤氣海不足者少氣不足以言血海有餘則嘗想其身大怫然不知其所病血海不足則嘗想其身小狹然不知其所病水穀之海有餘則腹滿能食水穀之海不足則飢而不受穀食髓海有餘則身輕有力自過其度髓海不足則腦空耳鳴脛痠眩冒目無所見懈惰嗜臥肝藏血血舍魂肝氣虛則恐實則怒脾藏營營舍意脾氣虛則四肢不用五藏不安實則腹脹經溲不利心藏脈脈舍神心氣虛則悲實則笑不休肺藏氣氣舍魄肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志腎氣虛則厥實則脹肝病者兩脅下痛引少腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之狀逆則頭痛耳聾則宗脈虛虛則下溜脈有所竭者故耳鳴人之自齧其舌者此厥逆走上少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣故邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足則為痿厥心悗人之善忘者上氣不足下氣有餘腸胃實而心肺虛虛則衛留於下久不以時上故善忘也人之善飢而不嗜食者精氣並於脾熱氣留於胃胃熱則消穀谷消則善飢胃氣逆上則胃脘寒故不嗜食也病而不得臥者衛氣不得入於陰常留於陽則陰氣虛故目不瞑也病而不得視者衛氣留於陰不得行於陽則陽氣虛故目閉也病有標本故有在標而求之於標有在本而求之於本有在本而求之標有在標而求之本故知標本者萬舉萬當不知標本是謂妄行先病而後熱者治其本先熱而後病者治其標先寒而後生病者治其標先病而後生寒者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生中滿者治其標先中滿而後煩心者治其本大小便不利治其標大小便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本因形氣以定診之說逐脈審察者一成之短隨人變通者圓機之士也瘦小之人氣居於表六脈常帶浮洪肥盛之人氣斂於中六脈常帶沉數性急之人五至方為平脈性緩之人四至便作熱醫身長之人下指宜疏身短之人下指宜密北方之人每見強實南方之人每多柔弱少壯之脈多大老年之脈多虛酒後之脈多數飯後之脈多洪遠行之脈多疾久飢之脈必空室女尼姑多濡弱嬰兒之脈常七至經曰形氣相得者生三五不調者死其可不察於此乎脈貴提綱之說脈者氣血之先陰陽之兆貴得其綱領而提挈之也左手為陽右手為陰關前為陽關後為陰浮取為陽沉取為陰躁數為陽遲慢為陰有力為陽無力為陰長大為陽短小為陰明乎此而脈之大端已在是矣故曰約而言之只浮沉遲數已見其梗概博而致之雖二十四字未盡其精詳經曰知其要者一言而終不知其要流散無窮此之謂也陰陽相乘相伏浮取之候兩關之前皆陽也若見緊小短澀之類是陽不足而陰乘之也沉取之候兩關之後皆陰也若見洪大數滑是陰不足而陽乘之也陰脈之中陽脈間一見焉此陰中伏陽也陽脈之中陰脈間一見焉此陽中伏陰也陰乘陽者必惡寒陽乘陰者必發熱陰中伏陽者期於夏陽中伏陰者期於冬以五行之理推之而月節可期也脈無根有兩說一以尺中為根人之有尺猶樹之有根水為天一之元先天命根也王叔和曰寸關雖無尺猶不絕如此之流何憂殞滅謂之有根也若腎脈獨敗是無根矣一以沉候為根經曰諸脈浮而無根者皆死是謂有表無里是謂孤陽不生造化所以亙萬古而不息者一陰一陽互為其根陰既絕矣孤陽豈能獨存乎此二說似乎不同而實則一致兩尺為腎部沉候之六脈皆腎也然則兩尺無根與沉取之無根總為腎水絕也經脈直指夫脈者氣血之先平則和氣盛則洪氣衰則微氣滯則澀氣縮則短氣虧則虛氣急則促氣大則長氣搏則浮氣鬱則沉氣寒則遲氣熱則數氣結則歇止見矣若以脈之盛者察諸病原未有不得其情者也左寸盛者風寒也右寸盛者痰火也左關盛者氣鬱也右關盛者內傷也左尺盛者房勞也右尺盛者勞力也兩寸俱盛者傷風生痰也兩關俱盛者氣鬱傷食兩尺俱盛者房勞兼之勞力也左寸與右關盛者風寒挾食也左寸與右尺盛者勞力受寒也右寸與左關盛者氣鬱生痰也右寸與左尺盛者陰虛火動也左寸與左關盛者感寒鬱氣也左寸與左尺盛者房勞受寒也右寸與右關盛者食積生痰也右寸與右尺盛者勞傷元氣感受風邪也左關與右尺盛者氣鬱勞傷也左關與左尺盛者房勞鬱氣也右關與左尺盛者醉飽房勞也右關與右尺盛者飽食勞役也又有六脈皆浮者為風滑者為痰遲則為冷濡則為濕洪則為火緊則為痛沉則為氣數則為熱弦則為寒弱則為虛芤則為失血澀則為少氣弦緊者為風寒微弱者為陽虛短縮者為陰虛浮滑者為風痰洪大者為火邪弦大者為實熱實大為有餘虛大為不足婦人脈婦人女子尺脈常盛而右手脈大皆其常也若腎脈微澀左手關後尺內脈浮或肝脈沉急或尺脈滑而斷絕不勻皆經閉不調之候也婦人三部浮沉正等脈來流利均勻和平無他病而不月者娠也尺脈滑大數而旺者亦孕也又左手尺脈洪大為男右手沉實為女又曰洪大為女經曰陰搏陽別謂之有子尺內陰脈搏手則其中有陽脈也陰陽相彀故能有子也凡女子天癸未行之時屬少陰既行屬厥陰已絕屬太陰胎產之病屬厥陰凡婦人室女病傷寒熱病及諸寒熱氣滯須問經事若何產後須問惡露有無多少辨胎脈脈動入產門者有胎也尺中脈滑而旺者胎脈左手尺脈浮洪者為男右手尺脈沉實為女關脈滑者為男左手寸口脈大為男右手寸口脈沉細為女足太陽膀胱洪大是男足太陰脈洪是女陽脈皆為男陰脈皆為女陰中見陽為男陽中見陰為女手少陰脈動者妊子也兩手尺部俱洪者為兩男兩尺俱沉實者為兩女左手脈逆為三男右手脈順者為三女寸關尺大小連疾相應是為一男一女脈滑而疾者三月胎候也但疾而不散者五月也關上一動一止者一月一動二止者二月依此推之萬不失一中衝是陽明胃脈連絡脈來滑疾者受孕及九旬尺脈沉細而滑或離經夜中覺痛日中則生矣傷寒不治症大發熱汗出不止如貫珠此本氣衰者不治爪甲青為陽氣衰者不治循衣摸床喘而不休衛氣絕者不治聲如鼻鼾肺絕者不治身體如僵正氣脫也喘而不休邪氣勝也汗出如油喘而不休水漿不下形體不仁乍靜乍亂者此為命絕也不治汗出發潤喘而不休者此為肺絕也陽反獨留形體如煙燻直視搖頭者此心絕也唇吻反青四肢縶習汗出者此肝絕也環口黧黑柔汗發黃者此脾絕也溲便失遺狂言目反直視者此腎絕也皆不治也醫書生死書也最忌迂而不切晦而不明以滋學者之惑而傷寒一書尤甚吾師因由博反約採取前賢往論集成二卷復講明陰陽升降之理切脈審症之要為一卷也名曰醫效秘傳書僅盈寸而旨趣無窮此吾師不得已成此既明且切之書以便學者觸眼即豁不致低徊沉索亦行遠自邇登高自卑之意也然讀是書者不得因其觸眼即豁而不低徊沉索又大非吾師繼往開來之深意矣乾隆七年五月望日門人陸得楩禹川百拜敬識附諸方桂枝湯桂枝芍藥生薑甘草大棗麻黃湯麻黃桂枝杏仁甘草桂麻各半湯即桂枝湯合麻黃湯麻桂飲官桂當歸炙甘草麻黃陳皮五苓散豬苓茯苓術澤瀉桂葛根湯葛根麻黃生薑桂枝芍藥甘草大棗桂枝加葛根湯即前方除麻黃柴葛解肌湯柴胡葛根羌活白芷黃芩芍藥桔梗甘草加薑棗石膏煎小柴胡湯柴胡黃芩人參甘草生薑半夏大棗大柴胡湯柴胡半夏黃芩芍藥生薑大棗枳實大黃理中湯白朮乾薑甘草人參附子理中湯即前方加附子加枳實茯苓蜜丸即枳實理中丸豬苓湯豬苓茯苓阿膠滑石澤瀉麻黃附子細辛湯麻黃附子細辛麻黃附子甘草湯即前方去細辛加甘草大承氣湯大黃芒硝厚朴枳實小承氣湯大黃厚朴枳實調胃承氣湯大黃芒硝甘草乾薑附子湯乾薑附子四逆湯附子乾薑甘草冷服四逆加人參湯即前方加人參大青龍湯麻黃甘草桂枝杏仁石膏生薑大棗小青龍湯麻
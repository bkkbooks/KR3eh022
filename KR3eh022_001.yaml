body:
  text: 卷一要書說傷寒之病不外六經欲明六經當知其要要者何定其名分其經審其症察其脈識陰陽明表裡度虛實知標本者是也定其名者是定其正傷寒或感冒與風溫溫毒之類也分其經者是分其陽經陰經直中之類審其症者是審其陽症陰症表症里症虛症實症寒症熱症之原察其脈者是察其有力無力及浮沉遲數弦滑之類也識陰陽者謂識其陽病陰病陽虛陰虛之候明表裡者是明其在表在裡或在半表半裡之間度虛實者是度其表虛里虛表實裡實之病耳知標本者欲知其一經之中而有標病本病之類也誠能若是可謂知其要矣既知其要則仲景三百九十七法一百一十三方不出握中矣何患症之不明病之難愈哉經曰知其要者一言而終不知其要流散無窮又曰知其要者萬舉萬當不知其要則支離破碎猶涉海而問津故曰傷寒要書六經圖足太陽膀胱經手小腸足太陽膀胱經乃諸陽之首故多傳變受病者為先其脈起於目內眥從頭下後項連風府行身之背終於左足外踝故頭項痛腰脊強發熱惡寒尺寸俱浮者太陽經受病也若頭痛發熱汗出惡風是風傷衛氣乃表虛宜解肌桂枝湯主之若頭痛發熱無汗惡寒是寒傷營血乃表實宜發散麻黃湯主之頭痛發熱惡寒者此太陽表症標病也不拘日數多少便宜發散若發熱煩渴小便不利者此太陽本府受病也宜利小便五苓散主之若小便利者不可再利利之則引熱入里而為熱結膀胱其人如狂等症又不可下下之則表邪乘虛入里而為痞滿結胸協熱下痢等症故曰太陽經症切不可下下之則表邪乘虛內陷而傳變不可勝數又不可利小便利之則引邪入里其害不淺又曰有汗不可服麻黃湯無汗不可服桂枝湯又曰有汗不可再汗汗多不可利小便也足陽明胃經手大腸足陽明胃經乃兩陽合明於前也胃府者府居中上萬物所歸也其脈起於鼻上額絡於目循於面行身之前終於左足內踝經曰尺寸俱長陽明受病也若頭額痛目疼鼻乾不得眠此陽明經標病也不拘日數多少即宜解肌葛根湯若身熱煩渴汗出惡熱此陽明經本病也宜清邪熱若潮熱自汗譫語發渴不惡寒反惡熱揚手擲足斑黃便硬等症此陽明胃府本實也急宜下之故曰在經當解肌在府當平熱府實則宜下足少陽膽經手三焦足少陽膽經乃前有陽明後有太陽居二陽之中所以主半表半裡以膽為清淨之府無出入之路不論在經在府治法俱同其脈起於目銳眥上頭角絡耳中循胸脅行身之側終於右足外踝經曰尺寸俱弦少陽受病也其症頭角痛而目眩胸脅痛而耳聾寒熱嘔而口苦皆少陽症也此經有三禁不可汗不可下不可利小便也只宜小柴胡湯加減和之凡頭角痛耳烘烘而鳴耳之上下腫痛皆少陽所主部分邪火為之也足太陰脾經手肺足太陰脾經為三陰之首其脈始於左足內踝大指行至腹絡於嗌連舌本行身之前若寒邪卒中直犯本經者一時便發腹痛或吐或利俱宜溫之若四五日而發腹滿嗌乾此傳經之邪也又宜和之如不渴而利者寒也理中湯溫之渴而利者熱也豬苓湯清之寒熱二症皆有腹滿以熱陷於內邪氣盛而充塞也寒勝於內胃氣虛而壅滯也足少陰腎經手心足少陰腎經為人身之根蒂其脈始於左足內踝足心上行貫脊循喉嚨絡舌本散舌下注心中行身之前若一二日無熱惡寒足冷踡臥或厥逆脈沉無力者宜溫經散寒若五六日而發口燥舌乾脈沉有力者此傳經之熱邪也急宜下之大抵少陰傷寒多因勞欲損傷腎經而致切不可妄投涼藥若脈沉足冷雖發熱急宜溫腎以扶元氣經曰少陰病始得之其脈沉其症反熱此少陰自受風寒以起病當汗之若一日則用麻黃附子細辛湯二日則用麻黃附子甘草湯切要記其日子用藥若三日後不可妄汗也經曰誤發少陰汗者必動陰血死不治少陰病不問利不利當分寒熱而治若脈沉實有力此熱也當下之若脈沉弱無力此寒也宜溫之然寒熱二症皆令有厥以陽熱內附致手足冷也陰寒獨勝亦手足冷也然寒症亦有渴者以少陰主水腎虛水燥而渴欲引水自救故少陰虛寒亦有渴症也足厥陰肝經手心胞足厥陰肝經厥者盡也六經之尾也其脈始於右足大指環陰器抵少腹循脅肋上唇口與督脈會於巔頂行身前之側若本經不足寒邪直入一二日便發吐利少腹疼脈沉無力無熱惡寒甚則唇青厥冷嘔吐涎沫舌卷囊縮此直中厥陰之寒症急溫之又曰脈沉有力飲水不止此熱也是即傳經之熱症急下之微細無力或沉伏不見此寒也急溫之然寒熱二症皆有舌卷囊縮以熱主煎迫寒主收引也須仔細辨之傷寒綱領傷寒一症雖有活人書明理論指掌圖傷寒論全生集等書其間有論缺方有方失論有脈無症有症無法者何哉蓋緣歷年既久遺失頗多實非仲景之全書也後之王叔和以斷簡殘編而補方造論成無己以順文註釋而集成全書所以遺禍至今而未止也嗟乎仲景之書失全傷寒之病枉死蓋傷寒原無定體或入於陽或入於陰入陽則太陽為首入陰則少陰為先故傳變不一治法不同而其要總不越乎陰陽表裡虛實寒熱知八者之要悉在浮中沉三脈有力無力中分辨之有力者為陽為實為熱無力者為陰為虛為寒若能明此八字則仲景三百九十七法一百一十三方瞭然於胸中矣今之治傷寒者一二日不問屬虛屬實便用麻黃桂枝湯以汗之三四日不問在經在府便用柴胡葛根湯以和之五六日不問在表在裡便用承氣等湯以下之致令陰陽俱病變症蜂起夫麻桂兩湯仲景專為冬月正傷寒而立也今人乃以通治非時暴寒溫暑又將傳經陰症與夫直中陰症混同立論豈不誤哉學者平時之際須將脈症講明方論詳審臨病之時得心應手則陽症陰症之別發汗吐下之宜瞭然於心確然無疑又須如珠走盤活潑潑地見太陽症直攻太陽見少陰症直攻少陰不可泥於始太陽終厥陰之論仲景曰日數雖多有表症而脈浮者宜汗之日數雖少有里症而脈沉者宜下之況乎仲景處方立論甚嚴曰可溫曰可下曰與下曰急下與夫先溫其里乃攻其表先解其表乃攻其里切不可執定一二日宜發汗三四日宜和解五六日方下更須審脈驗症辨府定經一一親切無疑方可下手真知其表邪而汗之真知其直中陰經而溫之桂枝承氣投之必瘥姜附理中發而必當可謂得其綱領者也傷寒論寒者冬月嚴寒殺厲之氣也然有冒有傷有中之不同冒者皮膚受寒鼻塞眼脹灑淅寒熱微覺拘倦者是也傷者即下文傳經之症也中者因體虛腠理疏豁寒邪直入三陰之經不從表傳其症四肢厥冷臍腹絞痛脈沉遲無力者是也蓋自霜降後至春分前乃天令嚴寒水冰地凍而成殺厲之氣人觸犯之即時而病者名為正傷寒其不即病寒毒藏於肌膚至春而發者為溫病至夏而發者為熱病古人均為之傷寒也然傷寒從表入里次第而傳如發於一二日間便覺頭項痛腰脊強發熱惡寒尺寸俱浮乃太陽經受病也若以次傳經必傳於胃如發於二三日間便覺目疼鼻乾不得眠日晡潮熱不惡寒反惡熱尺寸俱長乃陽明經受病也若以次傳經必傳於膽如發於三四日間便覺胸脅痛而耳聾寒熱嘔而口苦尺寸俱弦乃少陽經受病也若以次傳經必傳於脾如發於四五日間便覺腹滿嗌乾自利不渴尺寸沉細乃太陰經受病也若以次傳經必傳於腎如發於五六日間便覺口燥舌乾而渴尺寸俱沉乃少陰經受病也若以次傳經必傳於肝如發於六七日間便覺煩渴囊縮尺寸微緩乃厥陰經受病也則六經之形症已明矣然六經既明未可便視為一定不易之序有始於太陽以次傳入陰經而終於厥陰者或太陽不傳於陽明少陽而即傳於少陰者或不由陽經而直入陰經者或始終只在一經而不傳者或二陽三陽同受而為合病者或太陽陽明先後而為並病者緣經無明文後人妄治蒙害者多矣傷寒標本夫標本而曰先受病為本次傳流受病為標此言標本之大略也假令病人發熱惡寒頭痛身疼則知是太陽經表症標病也若加發熱煩渴小便不利則知是太陽經入府本病也假令病人目痛鼻乾不眠則知是陽明經表症標病也若加煩渴欲飲汗出惡熱則知是陽明經入府本病也若加潮熱譫語發渴不惡寒反惡熱揚手擲足斑黃狂亂則知是陽明經傳入胃府實病也假令病人頭角痛而耳聾寒熱嘔而口苦則知是少陽經經病也緣少陽居表裡之間而膽又無出入之路故皆以小柴胡湯和解之假令病人腹中滿嗌乾自利不渴則知是陽經熱邪傳入太陰經標病也若加燥渴腹滿則知是太陰經本病也若初起便就怕寒吐利則知是太陰經直中本病也假令病人舌乾口燥大便不通則知是陽經熱邪傳入少陰經標病也若初起便怕寒踡臥腹痛吐瀉則知是少陰經直中本病也假令病人囊縮消渴舌卷則知是陽經熱邪傳入厥陰經標病也若初起就怕寒嘔吐涎沫少腹疼痛舌卷囊縮則知是厥陰經直中本病也若總以六經言之而不分標病本病謬之甚矣故曰知標知本萬舉萬當不知標本如瞽者失杖而行有路而不知也表裡虛實有表虛有裡虛有表實有裡實仲景用麻黃湯為表實而設也用桂枝湯為表虛而設也表實用承氣裡虛用四逆昔華佗治倪尋李延俱患頭疼身熱佗曰尋當下延當汗或疑其異佗曰尋內實延外實是以異也發表之藥用溫攻裡之藥用寒溫里之藥用熱論表有邪則為陽虛溫之所以助陽也陽有所助則陰邪由以自消發表之藥用溫者此也即經曰陽虛陰盛汗之則愈是也邪傳裡則化熱傷陰寒之所以抑陽也陽受其抑則真陰得以自長攻裡之藥用寒者此也故經曰陰虛陽盛下之則愈是也若陰經自受寒邪則陽不足而陰有餘故用辛熱以助陽抑陰此溫里之藥用熱者是也傳足不傳手論謂傷寒傷足不傷手可也謂傷寒傳足不傳手則不可也蓋手之六經皆屬金火故金火不畏寒者也其足之六經曰土曰木曰水以水遇寒則凍冰木遇寒則葉落土遇寒則裂不堅是不能勝其寒也故能傷之由是觀之豈非傷足不傷手者乎傳之一字必是書寫之誤有感而云十六種治法仲景傷寒正名十六種其餘發狂譫語鄭聲結胸痞滿等症皆系十六種正病傳變所致豈可概論作傷寒稱之一傷寒傷寒者冬時觸冒寒邪而病即發者也其症頭項痛腰脊強發熱惡寒不煩躁無汗脈來浮緊而澀若在冬時霜降後及春分前宜用麻黃湯二傷風傷風者感冒風邪也其症頭痛身熱惡風自汗煩躁脈來浮緩宜桂枝湯脈緊而澀無汗惡寒者傷寒也緊為惡寒澀為無汗然寒傷營屬陰陰主閉藏是以無汗故用麻黃輕揚以發表浮緩惡風者傷風也浮為傷風緩為自汗故用桂枝甘溫以解肌三傷寒見風傷寒見風者其人初感於寒續中於風是也外症寒多熱少不煩躁脈當浮而緊今反浮而緩者此傷寒而見風脈乃營衛並傷之症也四傷風見寒傷風見寒者其人先中於風而重感於寒者是也外症惡風發熱煩躁脈當浮而緩今反浮而緊者此傷風而見寒脈亦營衛並傷之症俱用大青龍湯或九味羌活湯加減治之五濕病有傷濕有中濕有風濕傷濕者濕傷太陽膀胱經者是也中濕者濕中太陰脾經或腎經者是也風濕者或先傷於濕後傷於風風濕相搏而為病者是也蓋東南窊下之地水多聚焉居其處多濕或中風雨霧露是名中濕此脾經與腎經受病也其症一身盡疼發熱身黃脈沉而緩治宜燥勝可也或素有濕又中於風是為風濕其症肢體疼痛難以轉側脈沉而澀治宜微表以去其風行燥以去其濕大抵治濕之法咸用羌防以勝之二術以燥之苓澤以滲之或用附子以溫之看所挾風寒濕熱之有無及上下微甚以治之切不可大發汗汗之則風氣去而濕氣存又不可下下之則額上汗出微喘而死矣六濕溫濕溫者其人素傷於濕又中於暑者也其症兩脛逆冷腹滿多汗頭目痛或妄言切不可發汗發汗則使人不能言耳聾不知痛處身青面色變名曰重暍重暍宜白虎湯加蒼朮去暑燥濕故也七風溫風溫者其人素傷於風復傷於熱風熱相搏故也其症四肢不收頭疼身熱常自汗出治在少陰厥陰仲景曰汗出身熱者為風溫治宜辛涼疏風解熱為主切不可汗汗之則發譫語又不下下之則小便難更不可溫針溫針則耳聾而難言矣濕溫汗之名重暍風溫汗之多致死但取小汗清解表裡為佳八冬溫溫毒冬溫者冬感溫氣而成即時行之氣也何者冬令嚴寒而反溫熱人觸冒之名曰冬溫冬溫之病與傷寒大異以溫則氣泄是失其閉藏之令矣故古人用補中益氣帶表藥以治之溫毒者或冬令嚴寒觸冒寒邪待天氣暄熱而發或傷寒之熱未已再遇溫熱變為溫毒溫毒為病最重也治宜寒涼大解其熱若邪熱日深毒氣不泄發為癮疹斑爛與時氣發斑其病尤重或升麻葛根湯或化斑湯治之九中暍中暍者夏月所得熱病也與傷寒相類與熱病相同其症身熱大渴自汗煩躁不甚惡寒身體疼痛者是也蓋中暍者熱傷太陽經中暑者熱傷心脾經也雖與傷寒相似切不可作傷寒治之然手足雖冷脈息雖虛又不可用熱宜清心利小便或用清暑之藥可也活人書曰夏日有四症傷寒傷風脈症互見中暑熱病疑似難明然脈緊惡寒謂之傷寒脈緩惡風謂之傷風脈盛壯熱謂之熱病脈虛身熱謂之傷暑醫者可不明辨又有飢飽勞役之症以致肌膚燥熱大渴引飲面紅目赤脈洪而虛重按全無者此血虛發熱也症類白虎惟脈不長實為異耳誤服白虎湯者必死故東垣用當歸補血湯治之嗟乎中暑果類傷寒矣殊不知有類中暑者可不慎歟十溫病溫病者冬時感冒寒邪不即時而病藏於肌肉之中至春溫暖而發者是也其症發熱而渴不惡寒者為溫病也或用升麻葛根湯或用葛根解肌湯大抵治溫病之法無正汗之理此怫鬱之熱自內達外無表症明矣宜辛平之劑發散之十一熱病熱病者冬傷於寒不即發至春又不發鬱而至夏發者是也其病身熱頭痛煩渴不惡寒脈洪而盛蓋因夏月時熱兩盛治宜苦辛寒清解為主寒邪郁久化熱經曰熱病者傷寒之類也故主苦辛寒法以救之溫病熱病其脈洪大有力此陽症見陽脈也可治若脈來沉微細小此陽症見陰脈也必死經曰溫病攘攘大熱脈小足冷者死十二晚發晚發者清明後夏至前而發者是也其症身熱頭疼或惡風惡寒或有汗無汗或煩躁脈來洪數亦由冬時感寒所致比之溫熱二症稍輕耳不宜峻劑宜清解邪熱通用梔子升麻湯加減治之十三痙病痙病者太陽經傷風重感寒濕而致也又曰大發濕家汗則成痙其症頭項強直身熱惡寒搖頭噤口背反張者是也外症發熱惡寒與傷寒相似但其脈沉遲弦細兩目圓張而項背反張強硬如發癇之狀當視其有汗無汗以分剛痙柔痙若無汗惡寒名剛痙宜葛根湯有汗不惡寒名柔痙桂枝加葛根湯如汗下太過重亡津液以致筋脈失養不柔和而變痙者又宜補養氣血為主更有產後或金瘡一切去血過多之症皆能成痙亦當補養為先此則似痙而非痙者豈可一例而用風藥誤之十四溫瘧溫瘧者由傷寒之熱未已再感於寒變為溫瘧或過經壞病變為溫瘧而寒熱羈留者皆因寒熱相搏而成治宜散寒解熱為主並用加減小柴胡湯如熱多倍加柴胡寒多倍加桂枝而或柴胡葛根散其寒石膏知母解其熱也十五時行時行者謂春應暖而反寒夏應熱而反涼秋應涼而熱冬應寒而反溫是也蓋四時不正乖戾之氣流行其間而有其氣是以一歲之中長幼之病相似此則時行之氣也其外症有類傷寒治宜解散並用升麻葛根湯然時行猶外入之感冒而瘟疫乃內出之邪毒也十六寒疫寒疫者非時感冒之暴寒亦時行之氣也傷寒例曰從春分以後至秋分節前天有暴寒皆時行寒疫也其症憎寒惡風頭痛身熱或用消風百解散或用六神通解散加減大抵此病與溫病及暑病相似但治理有殊耳然溫暑之熱自內而出寒疫之邪寒抑陽氣乃外感者也故治宜解表若溫暑又兼表裡者也溫熱論原本無從種福堂本補入溫邪上受首先犯肺逆傳心胞肺主氣屬衛心主血屬營辨營衛氣血雖與傷寒同若論治法則與傷寒大異蓋傷寒之邪留戀在表然後化熱入里溫邪則熱變最速未傳心胞邪尚在肺肺主氣其合皮毛故云在表在表初用辛涼輕劑挾風則加入薄荷牛蒡之屬挾濕加蘆根滑石之流或透風於熱外或滲濕於熱下不與熱相搏勢必孤矣不爾風挾溫熱而燥生清竅必干謂水主之氣不能上榮兩陽相劫也濕與溫合蒸鬱而蒙痹於上清竅為之壅塞濁邪害清也其病有類傷寒其驗之之法傷寒多有變症溫熱雖久在一經不移以此為辨前言辛涼散風甘淡驅濕若病仍不解是漸欲入營也營分受熱則血液受劫心神不安夜甚無寐或斑點隱隱即撤去氣藥如從風熱陷入者用犀角竹葉之屬如從濕熱陷入者犀角花露之品參入涼血清熱方中若加煩躁大便不通金汁可以加入老年或平素有寒者以人中黃代之急急透斑為要若斑出熱不解者胃津亡也主以甘寒重則如玉女煎輕則如梨皮蔗漿之類或其人腎水素虧雖未及下焦先自彷徨矣必驗之於舌如甘寒之中加入鹹寒務在先安未受邪之地恐其陷入易易耳若其邪始終在氣分流連者可冀其戰汗透邪法宜益胃令水與汗並熱達腠開邪從汗出解後胃氣空虛當膚冷一晝夜待氣還自溫暖如常矣蓋戰汗而解邪退正虛陽從寒泄故漸膚冷未必即成脫症此時宜令病者安舒靜臥以養陽氣來復旁人切勿驚惶頻頻呼喚擾其元神使其煩躁但診其脈若虛軟和緩雖倦臥不語汗出膚冷卻非脫症若脈急疾躁擾不臥膚冷汗出便為氣脫之症矣更有邪盛正虛不能一戰而解停一二日再戰汗而愈者不可不知再論氣病有不傳血分而邪留三焦亦如傷寒中少陽病也彼則和解表裡之半此則分消上下之勢隨症變法如近時杏樸苓等類或如溫膽湯之走泄因其仍在氣分猶可望其戰汗之門戶轉瘧之機括大凡看法衛之後方言氣營之後方言血在衛汗之可也到氣才可清氣入營猶可透熱轉氣如犀角玄參羚羊等物入血就恐耗血動血直須涼血散血如生地丹皮阿膠赤芍等物否則前後不循緩急之法慮其動手便錯反至慌張矣且吾吳濕邪害人最廣如面色白者須要顧其陽氣濕勝則陽微也法應清涼然到十分之六七即不可過於寒涼恐成功反棄何以故耶濕熱一去陽亦衰微也面色蒼者須要顧其津液清涼到十分之六七往往熱減身寒者不可就云虛寒而投補劑恐爐煙雖熄灰中有火也須細察精詳方少少與之慎不可直率而往也又有酒客里濕素盛外邪入里里濕為合在陽旺之軀胃濕恆多在陰盛之體脾濕亦不少然化熱則一熱病救陰則易通陽最難救陰不在血而在津與汗通陽不在溫而在利小便然較之雜症則有不同也再論三焦不得從外解必致成里結里結於何在陽明胃與腸也亦須用下法不可以氣血之分就不可下也但傷寒熱邪在裡劫爍津液下之宜猛此多濕邪內搏下之宜輕傷寒大便溏為邪已盡不可再下濕溫病大便溏為邪未盡必大便硬慎不可再攻也以屎燥為無濕矣再人之體脘在腹上其地位處於中按之痛或自痛或痞脹當用苦泄以其入腹近也必驗之於舌或黃或濁可與小陷胸湯或瀉心湯隨症治之或白不燥或黃白相兼或灰白不渴慎不可亂投苦泄其中有外邪未解里先結者或邪郁未伸或素屬中冷者雖有脘中痞痛宜從開泄宣通氣滯以達歸於肺如近俗之杏蔻橘桔等是輕苦微辛具流動之品可耳再前云舌黃或濁須要有地之黃若光滑者乃無形濕熱中具虛象大忌前法其臍已上為大腹或滿或脹或痛此必邪已入里矣表症必無或十之存一亦要驗之於舌或黃甚或如沉香色或如灰黃色或老黃色或中有斷紋皆當下之如小承氣湯用檳榔青皮枳實元明粉生首烏等若未現此等舌不宜用此等法恐其中有濕聚太陰為滿或寒濕錯雜為痛或氣壅為脹又當以別法治之再黃苔不甚厚而滑者熱未傷津猶可清熱透表若雖薄而乾者邪雖去而津受傷也苦重之藥當禁宜甘寒輕劑可也再論其熱傳營舌色必絳絳深紅色也初傳絳色中兼黃白色此氣分之邪未盡也泄衛透營兩和可也純絳鮮澤者胞絡受病也宜犀角鮮生地連翹鬱金石菖蒲等延之數日或平素心虛有痰外熱一陷里絡就閉非菖蒲鬱金等所能開須用牛黃丸至寶丹之類以開其閉恐其昏厥為痙也再色絳而舌中心乾者乃心胃火燔劫爍津液即黃連石膏亦可加入若煩渴煩熱舌心干四邊色紅中心或黃或白者此非血分也乃上焦氣熱爍津急用涼膈散散其無形之熱再看其後轉變可也慎勿用血藥以滋膩難散至舌絳望之若干手捫之原有津液此津虧濕熱薰蒸將成濁痰蒙閉心胞也再有熱傳營血其人素有瘀傷宿血在胸膈中挾熱而搏其舌色必紫而暗捫之濕當加入散血之品如琥珀丹參桃仁丹皮等不爾瘀血與熱為伍阻遏正氣遂變如狂發狂之症若紫而腫大者乃酒毒衝心若紫而干晦者腎肝色泛也難治舌色絳而上有黏膩似苔非苔者中挾穢濁之氣急加芳香逐之舌絳欲伸出口而抵齒難驟伸者痰阻舌根有內風也舌絳而光亮胃陰亡也急用甘涼濡潤之品若舌絳而乾燥者火邪劫營涼血清火為要舌絳而有碎點白黃者當生疳也大紅點者熱毒乘心也用黃連金汁其有雖絳而不鮮乾枯而痿者此腎陰涸急以阿膠雞子黃地黃天冬等救之緩則恐涸極而無救也其有舌獨中心絳乾者此胃熱心營受灼也當於清胃方中加入清心之品否則延及於尖為津干火盛也舌尖絳獨干此心火上炎用導赤散瀉其腑再舌苔白厚而乾燥者此胃燥氣傷也滋腎藥中加甘草令甘守津還之意舌白而薄者外感風寒也當疏散之若白乾薄者肺津傷也加麥冬花露蘆根汁等輕清之品為上者上之也若白苔絳底者濕遏熱伏也當先泄濕透熱防其就干也勿憂之再從里透於外則變潤矣初病舌就干神不昏者急養正微加透邪之藥若神已昏此內匱矣不可救藥又不拘何色舌上生芒刺者皆是上焦熱極也當用青布拭冷薄荷水揩之即去者輕旋即生者也險矣舌苔不燥自覺悶極者屬脾濕盛也或有傷痕血跡者必問曾經搔挖否不可以有血而便為枯症仍從濕治可也再有神情清爽舌脹大不能出口者此脾濕胃熱鬱極化風而毒延口也用大黃磨入當用劑內則舌脹自消矣再舌上白苔黏膩吐出濁厚涎沫者口必甜味也為脾癉病乃濕熱氣聚與穀氣相搏土有餘也盈滿則上泛當用省頭草芳香辛散以逐之則退若舌上苔如鹼者胃中宿滯挾濁穢鬱伏當急急開泄否則閉結中焦不能從募原達出矣若舌無苔而有如煙煤隱隱者不渴肢寒知挾陰病如口渴煩熱平時胃燥舌也不可攻之若燥者甘寒益胃若潤者甘溫扶中此何故外露而里無矣若舌黑而滑者水來剋火為陰症當溫之若見短縮此腎氣竭也為難治欲救之加人參五味子勉希萬一舌黑而乾者津枯火熾急急瀉南補北若燥而中心厚者土燥水竭急以鹹苦下之舌淡紅無色者或干而色不榮者當是胃津傷而氣無化液也當用炙甘草湯不可用寒涼藥若舌白如粉而滑四邊色紫絳者溫疫病初入募原未歸胃府急急透解莫待傳陷而入為險惡之病且見此舌者病必見凶須要小心凡斑疹初見須用紙然照看胸背兩脅點大而在皮膚之上者為斑或云頭隱隱或瑣碎小粒者為疹又宜見而不宜見多按方書謂斑色紅者屬胃熱紫者熱極黑者胃爛然亦必看外症所合方可斷之然而春夏之間濕病俱發疹為甚且其色要辨如淡紅色四肢清口不甚渴脈不洪數非虛斑即陰斑或胸微見數點面赤足冷或下利清穀此陰盛格陽於上而見當溫之若斑色紫小點者心包熱也點大而紫胃中熱也黑斑而光亮者熱勝毒盛雖屬不治若其人氣血充者或依法治之尚可救若黑而晦者必死若黑而隱隱四旁赤色火鬱內伏大用清涼透發間有轉紅成可救者若夾斑帶疹皆是邪之不一各隨其部而泄然斑屬血者恆多疹屬氣者不少斑疹皆是邪氣外露之象發出宜神情清爽為外解里和之意如斑疹出而昏者正不勝邪內陷為患或胃津內涸之故再有一種白㾦小粒如水晶色者此濕熱傷肺邪雖出而氣液枯也必得甘藥補之或未至久延傷及氣液乃濕鬱衛分汗出不徹之故當理氣分之邪或白枯如骨者多凶為氣液竭也再溫熱之病看舌之後亦須驗齒齒為腎之餘齦為胃之絡熱邪不燥胃津必耗腎液且二經之血皆走其地病深動血結瓣於上陽血者色必紫紫如干漆陰血者色必黃黃如醬瓣陽血若見安胃為主陰血若見救腎為要然豆瓣色者多險若症還不逆者尚可治否則難治矣何以故耶蓋陰下竭陽上厥也齒若光燥如石者胃熱甚也若無汗惡寒衛偏勝也辛涼泄胃透汗為要若如枯骨色者腎液枯也為難治若上半截潤水不上承心火炎上也急急清心救水俟枯處轉潤為妥若咬牙齧齒者濕熱化風痙病但咬牙者胃熱氣走其絡也若咬牙而脈症皆衰者胃虛無谷以內榮亦咬牙也何以故耶虛則喜實也舌本不縮而硬而牙關咬定難開者此非風痰阻絡即欲作痙症用酸物擦之即開酸走筋木來泄土故也若齒垢如灰糕樣者胃氣無權津亡濕濁用事多死而初病齒縫流清血痛者胃火沖激也不痛者龍火內燔也齒焦無垢者死齒焦有垢者腎熱胃劫也當微下之或玉女煎清胃救腎可也再婦人病溫與男子同但多胎前產後以及經水適來適斷大凡胎前病古人皆以四物加減用之謂護胎為要恐來害妊如熱極用井底泥藍布浸冷覆蓋腹上等皆是保護之意但亦要看其邪之可解處用血膩之藥不靈又當審察不可認板法然須步步保護胎元恐損正邪陷也至於產後之法按方書謂慎用苦寒恐傷其已亡之陰也然亦要辨其邪能從上中解者稍從症用之亦無妨也不過勿犯下焦且屬虛體當如虛怯人病邪而治總之毋犯實實虛虛之禁況產後當血氣沸騰之候最多空竇邪勢必乘虛內陷虛處受邪為難治也如經水適來適斷邪將陷血室少陽傷寒言之詳悉不必多贅但數動與正傷寒不同仲景立小柴胡湯提出所陷熱邪參棗扶胃氣以衝脈隸屬陽明也此與虛者為合治若邪熱陷入與血相結者當宗陶氏小柴胡湯去參棗加生地桃仁楂肉丹皮或犀角等若本經血結自甚必少腹滿痛輕者刺期門重者小柴胡湯去甘藥加延胡歸尾桃仁挾寒加肉桂心氣滯者加香附陳皮枳殼等然熱陷血室之症多有譫語如狂之象防是陽明胃實當辨之血結者身體必重非若陽明之輕旋便捷者何以故耶陰主重濁絡脈被阻側旁氣痹連胸背皆拘束不遂故去邪通絡正合其病往往延久上逆心胞胸中痛即陶氏所謂血結胸也王海藏出一桂枝紅花湯加海蛤桃仁原為表裡上下一齊盡解之理看此方大有巧手故錄出以備學者之用附溫疫溫疫者因傷寒之熱未已更感時行之氣而為溫疫也其症身熱頭痛煩渴嘔逆或有汗或無汗皆由溫熱相合而成治宜寒涼解熱為主經曰更遇溫氣變為溫疫則知是再感溫氣而成溫疫更感溫熱而成溫毒者也何活人書混注冬溫症下而百病歌強以冬溫溫疫為一病不知冬溫是感非節之氣長幼之病相似時行之氣為病也溫疫乃傷寒再感溫氣而成實相似而非也敢錄之附瘟疫瘟疫者渾身壯熱惛惛不爽沿門闔境遞相傳染盛於春夏之間者是也雖因時氣而得然所感者皆由惡毒異氣而成非若春寒夏涼秋熱冬溫之類也夫天地間之氣升於春浮於夏不無有惡毒者在焉人在其中莫知也若正氣虛者遂致傳染或病者身熱其氣蒸蒸浮越於外若正氣虛者亦致傳染然感天地之邪者在春夏間感病人之邪者無分春夏者也是以獄中此病四時無間最易傳染其不染者由正氣內實邪不能感也然感是邪者從口鼻而入也由是正被邪侵怫鬱煩擾而病作矣雖因天地之邪實自內出者也故感受之因異傷寒異溫暑異非時感冒之寒疫其治法亦異也故丹溪用人中丸補散降三法並施明醫雜著用清熱解毒湯內外兼施斯二者乃治瘟疫之大法也大率當辟邪散氣扶助正氣為主若與長幼相似之時行混論則非矣今人多以溫病熱病名時行又以溫毒為瘟疫謬之甚矣噫非造道之元烏能識此西山記曰近穢氣傷真氣孫真人曰乘馬夜行當沐浴更衣方可近小兒使不聞馬毒氣不然則多天吊急驚也錢仲陽曰步糞穢之履毋近嬰兒亦此意也雍正癸丑疫氣流行撫吳使者屬先生制此方全活甚眾時人比之普濟消毒飲云先生云時毒癘氣必應司天癸丑太陰濕土氣化運行後天太陽寒水濕寒合德挾中運之火流行氣交陽光不治疫氣乃行故凡人之脾胃虛者乃應其厲氣邪從口鼻皮毛而入病從濕化者發熱目黃胸滿丹疹泄瀉當察其舌色或淡白或舌心乾焦者濕邪猶在氣分用甘露消毒丹治之若壯熱旬日不解神昏譫語斑疹當察其舌絳干光圓硬津涸液枯寒從火化邪已入營矣用神犀丹甘露消毒丹飛滑石十五兩淡芩十兩茵陳十一兩藿香四兩連翹四兩石菖蒲六兩白蔻四兩薄荷四兩木通五兩射干四兩川貝母五兩神麯糊為末神犀丹犀尖六兩生地一斤熬膏香豉八兩熬膏連翹十兩黃芩六兩板藍根九兩銀花一斤金汁十兩玄參七兩花粉四兩石菖蒲六兩紫草四兩即用生地香豉金汁搗丸每丸重三錢開水送下類傷寒四症痰症痰者津液所化蓋由風傷肺肺氣不清而生痰濕傷脾脾氣凝濁而生痰其人亦憎寒壯熱惡風自汗但胸膈病滿氣上衝咽不得息皆因肺氣不舒故雖類傷寒但頭不痛項不強或寸脈浮滑或沉伏為異爾宜瓜蒂散或稀涎散吐之傷食傷食類傷寒者以其亦有發熱惡寒頭疼等症但非若傷寒之甚者也其症或兼惡食或噫氣作酸或飽悶作痛氣口脈緊者是也當於消食門中求之虛煩煩者熱也心中鬱郁不安故謂之煩也蓋緣其人素弱有勞損因而損氣氣衰則精虛精虛則火旺即內經所謂陰虛生內熱也以內有熱則應於外然雖發熱而無惡寒頭疼身痛等症治宜補中益氣湯加黃柏腳氣腳氣類傷寒者以其有發熱頭疼身痛等症但初起足脛腫痛或足膝屈強不能移動為異爾其病始於受濕復感挾風寒暑熱而成故陳無擇曰腳氣不專主一氣亦不專在一經若自汗走注為風勝無汗攣急為寒勝腫滿重著為濕勝煩渴熱蒸為暑勝若四氣兼中但推其多者為勝又曰足脛焮赤而腫者濕熱也黃白而腫者寒濕也大法用二術以燥濕芩柏以清熱歸芍以調血木香檳榔以行氣烏附行經絡以除濕散寒羌獨利關節以散風勝濕防己牛膝行之下引以去濕消腫更看所挾風寒暑熱之有無微甚及在表在裡總當於腳氣門中求之切不可用補劑及湯藥淋洗並冷藥攤盦使毒氣上入心腹胸痹氣喘死矣新增類傷寒四症瘡毒瘡毒初生必有寒熱交作不可作傷寒治之蓋癰毒浮於肌表脈亦浮數經絡為邪壅遏身亦以熱熱毒居表陽氣不能衛外故亦惡寒其人飲食起居如常或偏著一處痛者此即癰毒病也當驗其頭面身體手足若有痛處或紅腫或堅塊或疔毒者須瘍科治之瘀血瘀血類傷寒者以其有寒熱故也蓋因素有痰火或胯縫或腋下略有動作必腫硬疼痛脈來弦數無力者為異也宜調氣養血活血有熱者或滋陰降火清痰勞發勞發有類傷寒以其虛寒虛熱故也其人或因於勞倦或傷於七情酒色以致精神疲憊營衛失司惡寒發熱骨節疼痛其脈或浮芤虛數或弦澀沉緊或搏堅皆其候也治當察其陰虛陽虛上損下損以分藏性之陰陽喜惡而調理之總當於虛勞門中求之痘疹凡幼稚之兒並長成之輩忽然發熱憎寒頭疼身痛唇紅臉赤嚏欠嘔吐狀類傷寒不可遽施汗下須問其曾否出痘如未出當驗其尻骨耳尖並足心皆冷者再觀耳後有紅脈赤縷即令專門調治之傷寒治例三十七條凡治傷寒須識陰陽二症如初起之時頭疼身痛發熱惡寒脈來浮大即是陽經之表症也自此以後煩躁作渴或不大便即是陽經傳入陰經之熱症也脈雖沉伏不可誤作陰症治之如初起之時臍腹絞痛手足厥逆唇青指冷脈來沉伏即是直中陰經之寒症也一或曾是陽症其人素弱不任轉下醫者下之太過忽然臍腹絞痛洞泄不止手足厥逆此陽症而轉為陰症也當溫之一或曾是陰症其人素有內熱醫者補之太過忽然煩躁作渴大小便不通此陰症而轉為陽症也當解之凡治傷寒須識表裡汗下無誤如病在表而反下之則乘虛入里微為痞氣結胸甚為腸滑洞泄此皆誤下之壞症也如病在裡而反汗之則表益虛而里益實矣或為衄血斑黃甚則亡陽此皆誤汗之壞症也凡治傷寒不論日數但有頭疼身痛惡風惡寒脈來浮大即是表症雖有便難小便不利亦當先解其表後攻其里也凡治傷寒不論日數但有腹痛吐利脈來沉弱即是里症也雖有惡風惡寒亦當先救其里後解其表也凡治傷寒先視兩目若黑白分明內無熱也目不明者里有熱也凡治傷寒須看唇舌若唇紅而鮮濕者內無熱也唇乾而燥者熱入里也若舌白滑者表未解也舌黃者熱漸深也舌黑者熱已劇也凡欲發汗須審其頭真痛項真強風寒真惡即當用湯藥汗之不可妄用水攻火劫之法凡欲攻下須審其頭不痛風寒不惡其便果硬其腹果滿即當以湯藥下之亦不可妄用丸藥凡傷寒在霜降以後春分之前名為正傷寒宜用辛熱之藥以發之若至春而發名為溫病至夏而發名為熱病宜用辛涼之藥以解之若入里者宜用苦寒之藥以下之若直中者宜用辛熱之藥以溫之其在四時有卒然感冒當視其寒暄或用辛熱或用辛涼要在適中凡風寒始傷太陽必用辛溫散之如麻黃桂枝之類若傳入陽明少陽必用辛涼解之如葛根柴胡之類至邪傳入胃府必用苦寒下之如承氣之類夫邪自表而入里用藥由溫而漸寒若誤治而致熱入攻之必宜苦寒凡服汗藥不可太過過則反致陽虛如服一劑無汗再作湯與之又復無汗此營衛乏絕法當養陰輔正而再汗之三治無汗者死凡服下藥燥屎已來又得溏泄此已解也如服下藥但利清水一二次又無燥屎痞滿如故此未解也當再下之如服下藥二三次而不通者此腸胃枯澀也當下取之取之而不通者死凡治傷寒須審胸腹若何胸滿而痛名為結胸胸滿不痛名為痞氣如未經下而有之此傳經之邪也已經下而有之此誤下之壞症也未經下飲水多而得者此水氣也凡治傷寒須按其腹痛與不痛硬與不硬若腹中痛與硬者此燥屎也臍下硬而痛者此燥屎與蓄血也臍下築築然痛上衝於心者此奔豚氣也腹中響氣下趨者欲作瀉也燥屎者小便不利而臍下如疙瘩狀蓄血者小便利而臍下如懷孕狀凡治傷寒須問渴與不渴渴而不飲水者邪在表也渴而飲水多者內熱甚也含水不欲吞者欲作衄也凡傷寒得死症其脈尚可治者則當棄症從脈虛補之實瀉之凡傷寒得死脈其症有可治者則當棄脈從症表急解之裡急攻之熱則清之寒則溫之凡傷寒脈洪大浮數動滑此陽脈也陽症宜見此脈若陰症得此者凶脈來沉澀弱弦微此陰脈也陰症宜見此脈若陽症得此者凶凡傷寒頭疼身熱忽然無脈而昏冒此欲汗之候如天將明六合皆晦之象不須服藥凡傷寒頭疼身熱便是陽症不可服熱藥太陰頭不疼身不熱少陰有反發熱而無頭疼厥陰有頭疼而無身熱凡傷寒之症不可驟用補益凡傷寒不思飲食不可就用溫補脾胃藥凡傷寒腹痛亦有熱症不可概用溫暖藥當參脈症治之凡傷寒自利者當看陰陽不可便用止瀉溫補凡傷寒手足厥冷當分熱厥冷厥凡傷寒若見吐蛔蟲者雖有大熱忌用寒涼凡服下藥另用鹽炒麩皮於病人腹上款款熨之使得熱則行而易通凡服藥吐出不納須用薑汁半鍾熱飲其吐即止凡傷寒發黃用生薑周身擦之若心胸脅下結實滿悶硬痛用姜渣炒熱於患處熨之若加蔥水更妙凡傷寒吐血不止用韭汁磨京墨呷下如無韭子雞子清亦可凡傷寒熱病亢極不解用黃連煎湯一盞井中頓冷浸於青布上搭在胸中徐徐易之候熱稍退即除凡傷寒腹中痛甚將河水一鍾飲之其痛稍可屬熱當用涼藥清之清之不已急用寒藥下之若飲水愈加作痛屬寒當用溫藥和之和之不已急用熱藥救之凡直中真寒陰症或痛甚無脈或吐瀉脫元無脈須用酒釀薑汁各半鍾服之脈來可治脈不來者死凡直中陰經之真寒症或腹中絞痛或嘔逆厥冷或不省人事或藥不得入口或六脈暴絕將蔥白三寸搗成餅先用麝半分填於臍中後放蔥餅在上以火熨之連易二三餅稍醒灌入薑汁然後煎服回陽急救湯如不醒再灸關元氣海若得手足溫和汗出者生凡傷寒陰病不論熱與不熱不分脈之浮沉大小但指下無力或重按全無便是陰病也最為良法表症表症者發熱惡寒頭疼身痛而脈浮者是也然惡寒者表症也惡寒為表之虛此屬太陽宜汗之若熱多寒少脈來微弱或尺脈遲者不可汗衄血下血者不可汗也壞病者不可汗也經水適來者不可汗也風溫者不可汗也濕溫者不可汗也虛煩者不可汗也動氣者不可汗也又有三陰病不可發汗發汗則動經血若太陰症脈浮者宜微汗之少陰症發熱脈沉者又宜麻黃附子細辛湯汗之里症里症者不惡寒反惡熱潮熱譫語腹脹滿大便硬脈沉而滑者是也然惡熱者里症也惡熱為里之虛此屬陽明宜下之若脈浮者不可下也虛細者不可下也嘔吐者不可下也不轉矢氣者不可下也小便清者不可下也三陰大約可溫而不可下然有積症又當下也如太陰腹滿時痛少陰口燥咽乾或腹滿不大便或下利清水心下痛此積症也表裡俱見症病人脈浮而大即是表症當汗之其人發熱煩渴小便赤澀卻當下此是表裡俱見也五苓散主之傷寒不大便六七日頭痛有熱即是里症當下之其人小便清者知不在裡仍在表也當發汗此是兩症俱見未可下宜桂枝湯病人心下滿不欲食大便硬即是里症當下之其人頭汗出微惡寒手足冷卻當汗此是兩症俱見仲景所謂半表半裡小柴胡湯主之無表裡症傷寒四五日或十餘日無表症無里症俱用小柴胡湯隨症加減用之陽症陽症者即太陽陽明少陽也初病發熱頭疼項強以後唇焦口燥煩渴喜冷面色光彩語言清亮手足溫暖爪甲紅潤大便或閉或硬小便或赤或澀脈來浮洪數大此皆陽症之候也其治或汗或和或下可也陰症陰症者即直中太陰少陰厥陰之寒症也初病無頭疼無身熱無口渴就便惡寒或戰慄面如刀刮身體沉重難以轉側嘔吐瀉利小便清白踡臥欲寐手足厥冷爪甲青黑面色慘黯而無光脈來沉澀而細小此皆陰症之候也其治或溫或補可也陽毒陽毒者陽氣獨盛陰氣暴絕所致也或陽症誤服溫熱之藥或吐下後變成陽毒其人壯熱發躁或狂走罵詈妄見鬼神或口吐膿血而發錦斑或舌卷焦黑鼻如煙煤或咽喉腫痛下利黃赤六脈洪大而數輕者陽毒升麻湯重則青黛一物湯陰毒陰毒者陰氣獨盛陽氣暴絕所致也或虛症誤服寒涼之藥或吐瀉後變成陰毒其人臍腹攪痛身如被杖或四肢厥冷六脈沉細微弱陰毒甘草湯主之

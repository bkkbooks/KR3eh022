body:
  text: 卷二傷寒諸證論發熱發熱者怫怫然發於皮膚之間熇熇然散而成熱者是也與潮熱寒熱煩躁之熱不同煩躁之熱熱在內者也潮熱之熱有時而熱不失其時寒熱之熱寒已而熱相繼而發至於發熱則無時而發也然有翕翕發熱蒸蒸發熱之異翕翕發熱者若合羽所覆明其熱在外也故與桂枝湯汗以散之蒸蒸發熱者若熏蒸之蒸明其熱在內也故與調胃承氣湯下以除之然發熱屬表者即風寒客於皮膚陽氣怫鬱所致也發熱屬裡者即陽氣下陷入陰中所致也觀其熱所從來而汗下之症明矣若熱先自皮膚髮者知邪氣在外者也熱先自里生而達於表者知邪氣在裡者也舉斯二者則邪之在表在裡又明矣惟其在表在裡俱有發熱故半表半裡亦有發熱何者以表症未罷邪氣傳裡里未作實是為半表半裡然同一發熱也或始自皮膚而漸傳為裡熱或始自內熱而外達於肌表故邪氣在表而發熱者表熱而里不熱也邪氣在裡而發熱者裡熱甚而達於表也其在半表半裡而發熱者則表裡俱發熱者也難經云發熱惡寒者發於陽也無熱惡寒者發於陰也然太陰厥陰皆不發熱惟少陰病始得之雖有發熱之症亦脈沉下利手足冷為異爾故與麻黃附子細辛湯汗以散之然有汗後發熱者或表邪未盡或里症已具或邪在半表半裡之間有下後發熱者或宿垢未盡或丸藥誤下有勞復發熱者蓋因新瘥後津液未復血氣尚弱或語言以傷氣思慮以傷神邪熱隨至原病復舉當調和營衛清解邪熱為佳也有食復發熱者須滌邪扶正消食丸為妙也雖然發熱傷寒之常也如有陰陽俱虛及下利與新汗後又皆惡其熱也豈可一概論耶惡寒惡寒者風寒客於營衛之中也惟其風寒客於營衛則灑淅然惡寒也惟其營衛之受風寒則嗇然不欲舒也其惡寒者非惡寒熱之寒又非惡風也蓋惡風見風則惡若居密室之內幃帳之中則坦然自舒也至於惡寒者雖不見風亦自裡寒雖身大熱亦欲近衣始發之間戰栗鼓頷甚則體振肌膚粟起毫毛畢直雖在幃帳之中重衣厚被亦不能御其寒也且寒熱之寒謂寒熱更作熱至則寒無矣其惡寒者雖身發熱而不欲去衣甚至向火覆被猶不遏其寒也所以然者由陰氣上入陽中或陽微或風虛相搏所致惡寒一切屬表若下症悉具而微惡寒者是表猶未解當先解表乃可攻裡也經曰發熱惡寒發於陽無熱惡寒發於陰如傷寒或已發熱或未發熱若先惡寒必繼之以發熱此則發於陽也若惡寒而踡臥脈細而緊此則發於陰也在陽者可發汗在陰者可溫里惡寒雖悉屬表而在表自有虛實之別若汗出而惡寒者為表虛可解肌無汗而惡寒者為表實可發汗如汗後仍不解反惡者虛故也芍藥甘草附子湯主之如或少陰病惡寒而踡臥手足厥冷自利煩躁脈不至者又為不治之症按發熱惡寒明是傷寒之候然亦有近似傷寒者如脈浮而數發熱惡寒是傷寒症也若脈浮而發熱惡寒或有痛處是癰疽症也脈浮而澀發熱惡寒或膈實嘔吐噫噯吞酸是傷食症也脈浮而弦發熱惡寒或惡食是欲作瘧也由是觀之發熱惡寒之症豈同一而語哉背惡寒背為陽腹為陰背惡寒者陽氣不足陰寒氣盛故也若風寒在表而惡寒則一身盡寒矣若陽氣衰陰氣盛寒邪在裡口中和無熱而背惡寒者屬少陰也宜溫之附子湯主之若陰氣微陽氣盛熱邪陷內口燥熱而背惡寒者屬陽明也宜清之白虎加人參湯主之三者均自背惡寒也有陰陽寒熱之不同而於口中潤燥得之惡風惡風者見風則怕在密室之中無所惡也蓋因風邪傷衛衛氣虛弱腠理不密所以汗出而惡風也然衛氣者能溫分肉充皮膚肥腠理司開闔者也若風邪中於衛則必惡風何也風則傷衛寒則傷營衛為風邪所中分肉不溫而熱矣皮毛不充而緩矣腠理失其肥則疏而不密開闔失其司則泄而不固是以惡風也然惡風惡寒二症均為表症以惡風與惡寒比之惡寒者嗇嗇然而憎寒即不當風而自惡寒其惡風者得居密室之中幃帳之內舒緩而無所畏也或用扇或當風則淅淅然而惡此為惡風也惡寒有屬於陽有屬於陰若是惡風悉屬陽非若惡寒有陰陽之別也故三陰之症並無惡風者是也然惡風雖悉屬表而發散又有不同若無汗而惡風為傷寒當發其汗汗出而惡風為中風當解其肌若下症悉具而惡風未罷者當先解其外也又有汗多亡陽與風濕皆有惡風之症若發汗過多遂漏不止衛虛亡陽惡風脈浮者必以桂枝加朮附湯溫其經而固其衛若風濕相搏骨節煩疼濕勝自汗皮腠不密惡風短氣必用甘草附子湯散其濕而固其衛由是觀之惡風屬衛明矣寒熱寒熱者謂往來寒熱也經曰血弱氣虛腠理受邪陰陽相勝邪正相爭而作矣若邪氣之入也而正氣不與之爭但熱而無寒也今熱而寒者謂正氣與邪氣分爭於是寒熱作矣爭則氣鬱不發於外而寒熱爭焉爭甚則憤然而熱故寒已而外熱作焉斯乃寒熱之理也或謂寒熱者陰陽爭勝也以陽勝則熱陰勝則寒斯乃陰陽之爭也何則以寒為陰而熱為陽以里為陰而表為陽邪之客於表者為寒邪與陽爭則為寒矣邪之入於裡者為熱邪與陰爭則為熱矣其邪半在表半在裡外與陽爭而為寒內與陰爭而為熱是則表裡不拘內外不定或出或入由是寒熱且往且來而間作也是以往來寒熱多屬半表半裡之症一云陽不足則陰邪出表而與之爭故陰勝而為寒陰不足則陽邪入里而與之爭故陽勝而為熱邪居表多則多寒邪居里多則多熱邪在半表半裡則寒熱平半矣審其寒熱多少視其邪氣深淺俱用小柴胡湯和之若寒多加桂枝熱多加大黃是大法也似瘧似瘧者與發熱惡寒往來寒熱相似而實非也寒熱似瘧者作止有時若往來寒熱則作止無時或往或來日有至三五發甚則十數發者是也至於發熱惡寒者為發熱時惡寒並不見惡寒時發熱亦不見也不若此寒已而熱熱已而寒也然有太陽似瘧有陽明似瘧有厥陰似瘧有婦人熱入血室似瘧症雖同而用藥異也潮熱潮熱者若潮水之潮其來不失其時一日一發日晡時至者是也日若三五發即是發熱非潮熱也潮熱者以表邪傳至陽明胃府胃實而致潮熱也蓋陽明旺於未申時所以發於日晡是日晡所發潮熱者屬陽明也惟其陽明故潮熱為可下之症經曰潮熱者胃實也又曰潮熱者此外欲解可攻其里又曰若熱不潮未可與承氣湯雖然潮熱屬裡實可下之症或脈浮而緊潮熱而利或小便難大便溏與夫潮熱於寅卯則屬少陽潮熱於巳午則屬太陽是皆尚有表邪未全入里先須解表待小便利大便硬而燥渴者方可攻之自汗自汗者不因發散而自然汗出者是也蓋衛為陽能護衛皮膚肥實腠理禁固津液不得妄泄若邪干於衛不能衛固於外則皮膚為之緩腠理為之疏由是津液妄泄濈濈然潤縶縶然出謂之自汗也故曰風暑濕邪干之皆令自汗惟傷寒人獨不出汗因傷營而不傷衛以寒氣收藏故也若寒漸入里傳而為熱亦令汗出以熱則營衛通腠理開而汗泄矣然自汗之症又有表裡之別虛實之異若汗出惡風及微惡寒皆表未解必待發散而後愈至於漏不止而惡風及發汗後惡寒又皆表虛必得溫經而後愈大抵傷風則惡風自汗傷濕則身重自汗中暑則脈虛自汗中暍則煩渴自汗濕溫則妄言多汗風溫則鼾睡自汗霍亂則吐瀉自汗柔痙則搐搦自汗陽明則潮熱自汗陰虛則身倦自汗亡陽則遂漏不止自汗各開本條不及細詳設或汗如貫珠喘而不休又為衛絶不治之症也盜汗盜汗者謂睡去則出醒來則止然雜病盜汗責其陽虛傷寒盜汗由邪氣在半表半裡使然也何則以邪氣在表干於衛中則自然汗出此則邪氣侵行於里外連於表睡則衛氣行里表中陽氣不致津液得泄故睡則汗出覺則氣散於表而汗止矣且自汗有虛有實而盜汗悉皆和表而已頭汗頭者諸陽之會邪搏諸陽津液上湊則汗見於頭也若邪熱內蓄蒸發腠理遍身汗出謂之熱越今瘀熱在裡不能發越熱蒸於陽故令頭汗出也何者以三陰之經至頸而還不循於頭獨諸陽脈上循於頭耳夫頭汗出者五內乾枯津液衰少慎不可再汗也一云將欲發黃先出頭汗則頭汗之症發黃症也治宜清理濕熱又有水結而頭汗出者宜溫散水氣若半表半裡而頭汗出者當和營衛其或瘀熱在裡或熱入血室並虛煩之症皆令頭汗或吐或下以去其邪設或小便不利濕家下後又為陽脫而不可治也手足汗手足即四肢也四肢乃諸陽之本而胃主四肢手足汗出者是陽明之症也然有自汗出有頭汗出有手足汗出者悉屬陽明也何者若一身汗出謂之熱越是熱外達者也若頭汗出是熱不得越而熱氣上達者也今手足汗出為熱聚於胃逼其津液而旁達於四肢者也或謂熱聚於胃故手足汗出矣而寒聚於胃獨無汗出者何故經曰蘊熱則燥屎譫語手足汗出者承氣湯主之挾寒則水穀不分手足冷汗自出者理中湯主之是以有承氣理中之不同無汗傷寒無汗何以明之蓋腠理者津液湊泄之所為腠文理縫會之中為理如津液為風暑濕氣所幹外湊皮腠則為自汗若寒邪中經腠理致密津液內滲則為無汗然無汗之由又有數種如寒邪在表及邪氣行於里或水飲內蓄與夫亡陽久虛皆令無汗者也如或當汗不汗服湯劑病症仍在至三劑不汗者死頭痛頭痛者寒邪入足太陽經邪氣上攻於頭所致也蓋三陽之脈皆上於頭而頭疼獨太陽為專主也若太陰少陰之脈至頸而還不上循頭則無頭疼之症惟厥陰之脈循喉嚨入頏顙連目眥上出額雖有頭疼卻無身汗故發熱惡寒頭痛者太陽也至於頭痛不大便潮熱譫語者承氣湯主之頭痛口苦脈弦者小柴胡湯主之頭痛吐涎沫者吳茱萸湯主之設或兩感於寒而頭痛與夫痛連入腦手足青至節又為真頭痛而不可治也身體痛身體痛者蓋因風寒入於肌膚孔竅閉塞血脈漸滯不和所致乃太陽經病也然有發汗溫經之不同如太陽身痛惡寒發熱頭疼無汗者麻黃湯風濕身痛一身困重莫能轉側者桂枝湯加附子陰症身痛如被杖脈沉自利者四逆湯至若脈寸遲而身痛與汗後脈沉遲而身痛者皆血不足也並用黃耆建中湯勞倦之人身體疼痛者必脈虛困倦用補中益氣湯若瘡家身體痛切不可發汗汗之則成痙脅痛脅乃少陽部分傷寒傳至少陽則脅痛之症現矣然有表裡水氣而脅痛者有邪熱攻注而脅痛者有食積相連而脅痛者有積痰咳喘而脅痛者有惡血停蓄而脅痛者之不同項強項強者頸硬而不能回顧左右者也蓋太陽感受風寒則經脈不利而項為之急頸為之強耳是則傷寒頸項強急乃太陽表症也發散則解若結胸項強誤下之症寒濕項強則多痙症一云太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之太陽病項背強𠘧𠘧無汗惡寒者葛根湯主之二者均是項背強急而發散則有輕重之不同以發熱汗出惡風為表虛可解肌無汗惡寒為表實可發汗是以治之不同也頭眩有眩運者有眩冒者運為轉運之運此則頭旋者是也冒為蒙冒之冒此為昏迷者是也乃少陽為病以少陽屬木木能生風風主運動故時目旋而頭眩也針經曰上虛則眩下虛則厥則知是少陽表邪漸行於里表中陽虛故有此症也然有太陽漏汗不止而頭眩有陽明風病善食而頭眩有汗吐下後氣虛而頭眩有素因怯弱血少而頭眩有火載痰上而頭眩有正氣虛脫而頭眩有婦人經水適來而頭眩有易病真元耗奪而眩運輕則起方眩運重則臥亦旋轉矣一云不經汗吐下脈弦而眩運者小柴胡湯主之若經汗吐下後而眩運者宜用溫經之藥故仲景治頭眩而用茯苓桂枝白朮甘草真武之類頭重傷寒頭重有二症有太陽惡寒項強頭疼而不能舉宜發散寒邪有異病百節解散而眩運不能舉宜補益真元咽痛咽痛者熱毒上衝所致也宜甘桔苦酒湯主之然有陰陽二症脈浮數面赤斑斑如錦紋而咽痛吐膿血者此陽毒也脈沉遲手足冷或吐利而咽痛者此少陰也咽癢咽癢者或陽厥誤汗而致或寒伏於腎陰火上衝而致身癢身癢者或太陽不能作汗而致或陽明久虛無汗而致或厥陰似瘧不能得小汗而致耳聾耳聾者邪傳少陽之經也若未曾經汗宜和解曾重發汗宜補胸脅滿胸滿者謂膈間氣塞滿悶非心下滿也脅滿者謂脅肋下氣塞填滿非腹中滿也蓋邪氣自表傳裡必先自胸膈脅肋以次至腹入胃是以胸滿多帶表症治宜發散脅滿為半表半裡症治宜和解若腹滿又為里症而用通利之法也大抵胸脅滿者以邪氣初入里未停留為實氣鬱積而不行致生滿也發散和解之斯可矣若邪氣留於胸中聚而為實者非湧吐不可也心下滿附結胸痞氣臟結心下滿者謂正當心下高起滿硬者是也若不經下後而滿則有吐下之殊若下後而滿則有結胸痞氣之別一云實邪留結則為硬為痛名結胸也虛邪留滯則為痞滿滿而不痛名虛痞也經云病發於陽而反下之熱入於裡因作結胸病發於陰而反下之因作痞氣病發於陽者謂身熱惡寒也應宜發汗若早下之則表邪乘虛而入結於心下而為結胸也病發於陰者謂無熱惡寒也先宜解表若早下之則邪氣入於中焦而為痞氣是以結胸痞氣等症皆因下早而成當分大小寒熱水五者以治之若不按而痛或腹臍堅硬手不可近者大結胸也大陷胸湯主之心下滿按之方痛者小結胸也小陷胸湯主之懊憹滿悶身無熱者寒結胸也三物白散或枳實理中湯主之懊憹煩躁舌上燥渴者熱結胸也大陷胸湯主之心下怔忡頭微汗出身無大熱揉之汩汩有聲者水結胸也小半夏茯苓湯主之大抵結胸與痞皆應下之若表未解不可攻之仲景曰當先解表待表解乃可攻之解表宜桂枝湯攻痞宜大黃黃連瀉心湯一説治痞服瀉心不愈然後可用陷胸下之節庵曰結胸因下早而成若未經下非結胸也乃表邪傳至胸中未入乎腑症雖滿悶尚在於表只須小柴胡湯加枳桔可也世醫但見心下滿便呼為結胸輒用瀉利之藥反成真結胸有之也設或結胸症煩躁者不治臟結者其症如結胸狀飲食如故時時下利仲景無治法故曰臟結者死一切結胸等症先用枳桔以寬其氣外用薑渣揉尉法甚良腹滿腹滿者腹中脹滿也脾為中央土所以腹滿者多屬太陰症也當分虛實而治經曰腹滿不減者為裡實當下之腹滿時減者為裡虛當溫之然腹滿雖為里症亦有淺深之別經曰表已解而內不消非大滿未可下是未全入腑也若大滿大實堅硬燥屎日數雖少當下之是邪氣已入腑也若陽邪陷內而為腹脹則口燥咽乾陰寒入里而為腹脹則吐利厥逆一説腹脹滿者正虛邪勝陰陽不和清濁相混用桔梗半夏湯最良少腹滿少腹滿即臍下滿也若胸中滿皆為邪氣而非物今少腹滿則為有物而非邪氣茲若腹中滿者則有為之燥屎矣經曰清陽出上竅濁陰出下竅當出不出積而為滿是知在上而滿者氣也在下而滿者物也所謂物者溺與血也如小便利者則為蓄血也小便不利者乃為溺澀之症此攻血滲利宜分兩途腹痛腹痛皆因邪氣入里與正氣相搏故也經曰諸痛為實又曰病隨利減此則言其實也若虛而作痛者豈可一例視之乎大凡不可按不可揉者實也可按可揉者虛也時痛時止者虛也痛無休息者實也陽邪傳裡裡氣作實腹痛大便硬者實也陰邪入里裡氣停寒腹痛瀉利者虛也脈來滑大有力者實也弦細無力者虛也又當分其大小少三腹而治之大腹痛者即心腹痛也為有寒邪食積屬太陰小腹痛者即臍腹痛也為有熱邪燥屎屬少陰少腹痛者即臍以下丹田穴痛為有瘀血結溺屬厥陰若陽邪傳裡而腹痛不常當以辛溫之劑和之小建中湯之類若陰寒入里而腹痛則痛無休時常欲作利當以熱劑溫之如附子理中湯之類若燥屎譫語不大便腹滿而痛者宜以藥下之如承氣湯之類煩煩者熱也與發熱若同而異發熱者怫怫然發於肌表有時而已者是也煩者其熱無時而歇者是也二者均是表熱而煩熱為熱所煩非若發熱而時發時止故為煩熱經曰病人煩熱汗出則解又曰發汗熱已解半日許復煩脈浮數者再與桂枝湯即此觀之煩為表熱明矣又有煩疼即是熱疼煩渴即是熱渴也以煩為熱又何疑乎至於胸中煩心中煩內煩虛煩皆為熱也虛煩虛煩者心中欲吐不吐擾亂轉側不安鬱悶不舒之貌蓋因邪熱傳裡故有胸中煩心中煩虛煩之別非若煩熱而為表熱也如不經汗吐下而煩則是傳經之熱不作膈實但多和解而已若因汗吐下後而煩則是內陷之煩但多湧吐而已一云先煩而悸者為實先悸而煩者為虛學者觀其熱所從來審其虛實而治則無誤矣煩躁煩為擾亂而煩躁為憤怒而躁合而言之煩躁皆熱也析而言之煩也躁也有陰陽之別焉煩者陽躁者陰也經曰心熱則煩陽盛陰虛又曰腎熱則躁陰盛陽虛煩為熱之輕躁為熱之甚也若煩疼煩滿煩渴虛煩者皆以煩為熱也若不煩而躁者為怫怫然便作躁悶此陰盛格陽也雖大躁欲於泥水中臥但水不得入口者是也所謂煩躁者先發煩而漸至躁也所謂躁煩者先發躁而迤邐復煩也煩躁之由又各不同有邪氣在表而煩躁者有邪氣在裡而煩躁者有火劫而煩躁者有陽虛而煩躁者有陰盛而煩躁者經云當汗不汗其人煩躁又曰脈浮而數不汗出而煩躁俱用大青龍湯主之是邪氣在表而煩躁者也病人不大便五六日繞臍下硬痛煩躁發作有時此有燥屎也承氣湯主之是邪氣在裡而煩躁者也太陽病以火熏之不得汗其人必躁太陽病火尉其背令大汗出大熱入胃亦令煩躁是火劫而煩躁者也若已下復發汗晝日不得眠夜而安靜不嘔不渴無表裡症脈沉微身無大熱而煩躁者乾薑附子湯主之此陽虛而煩躁者也少陰吐利手足厥冷煩躁欲死者吳茱萸湯主之此陰盛而煩躁者也諸如此者乃症之常非熱也設或結胸證具而煩躁吐利四逆而煩躁惡寒踡臥而煩躁皆為死證而不治也不得眠夜以陰為主陰氣盛則目閉而安臥若陰虛為陽所勝則終夜煩擾而不眠也心藏神大汗後則陽氣虛故不眠心主血大下後則陰氣弱故不眠熱病邪熱盛神不清故不眠新瘥後陰氣未復故不眠若汗出鼻乾而不得眠者又為邪入表也欲寐衛氣者晝則行陽夜則行陰行陽則寤行陰則寐今欲寐者蓋因陽氣虛陰氣盛故目瞑而多眠也乃邪傳陰而不在陽也然傷寒之多眠雖屬於少陰居多而亦有不同如太陽十餘日脈沉細惡寒踡臥而欲寐者此神氣昏也汗出身重鼻乾語澀目不了了而多眠者此風溫病也唇黑有瘡咽乾聲啞默默而多眠者此狐惑也若汗下後邪氣已退正氣已復身涼脈微鼾息酣睡此吉兆也懊憹懊憹者心中懊憹鬱悶不舒之貌比之煩悶尤甚者也蓋也表邪未解而遽下之陽氣內陷於心胸之間鬱而不發心中惱亂不安甚則為結胸也若邪在心胸宜吐在胃府宜下已吐下後邪氣壅塞而未盡心中鬱悶而不舒又當隨其虛實以治之拘急拘急者手足屈伸不便如踡臥惡風之貌以四肢乃諸陽之本因發汗亡陽陽虛而有此症也舌苔舌者心之官應南方火本紅而澤若傷寒邪熱煎爍則津液枯涸是以心苗乾稿而舌生苔矣若邪熱在表則生白苔邪熱在裡則生苔刺其或黃或黑或澀或滑或生芒刺或生裂紋者為熱氣之淺深者也故曰苔白而滑邪熱漸深苔黑而裂邪熱尤極病則危篤矣大抵鮮紅濕潤者吉燥澀乾裂者凶又有一種陰寒症水極反來剋火亦現黑苔等症其苔必濕冷而滑不燥不澀不渴不熱脈必沉細症必足冷又當以四逆湯溫之夏月人病黑苔者因時火與邪火內外炎爍尚有可生未可斷其死症若冬月黑苔者必死此心傳之妙也一切白苔之症用生薑片蘸蜜擦之黃苔之症用青布裹指蘸薄荷湯或冷水頻擦之至若苔黑而裂乃水刑于心火也經曰熱病口乾舌黑者死衄血附少陰衄衄血鼻中出血者是也蓋因經絡熱甚陽氣擁重迫血妄行出於鼻者為衄也然雖熱甚邪尤在經慎不可發汗雖云桂枝湯治衄非治衄也正欲發散其經中之邪氣耳故雜病衄者積熱在裡傷寒衄者積熱在表然衄血雖為欲解若衄不止而頭汗身無汗及發熱不止又為不治之症也凡衄血點滴成流此邪欲解少頃自愈若點滴不成流邪尚在經未得解散卻須調治又云衄血下一二升不止不必驚惶以紙摺疊數層冷水浸濕卻與病人項後及鼻梁兩太陽穴上頻頻搭之即愈陰症有衄血者何然陰症無熱何緣有衄經云少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從耳目是名下厥上竭為難治也吐血吐血口中血出是也蓋因當汗失汗邪熱入臟積瘀於內所致也若見眼閉目紅神昏語短眩冒迷妄煩躁漱水驚狂譫語背冷足寒四肢厥冷胸腹急滿小便自利大便黑者皆瘀血症也不必悉具但見一二便作血症主張宜清解熱毒使血順下則安凡治血症上焦犀角地黃湯中焦承氣湯下焦抵當湯噦附噫氣噦與乾嘔相似噦者其聲濁而長嘔則聲短而小皆有聲而無物出是嘔為輕噦為重也經曰木衰者枝葉枯落病深者其聲噦蓋因胃氣本虛汗下太過胃氣虛冷則噦或恣飲冷水水寒相搏則噦是則胃中虛寒故也理中湯主之又有熱氣鬱遏上塞下不通則噦輕則和解之疏利之甚則溫散之至若噦而不屎者則病篤矣又有所謂噫氣者胸喉間氣不得下通然而無聲也蓋因寒氣客胃厥逆上行復出於胃故為噫也理中湯加橘皮半夏丁香之類厄逆厄逆氣自腹中時逆上衝才發聲於咽喉則遽止軋軋然連續數聲其聲短促不長俗謂之厄忒古謂之噦非也且其氣皆從胃中起至胸嗌之間而為厄忒也若將厄逆紊為噦與咳逆誤人多矣然厄逆之病或胃中實熱失下而作或服寒涼太過胃中虛冷而作或胃中痰火沖逆而作或水氣停蓄而作或食積壅塞而作寒者溫中以散寒熱者涼膈以逐熱水停者分利之食積者消導之痰逆者開豁之俱用引而伸之達而降之推而逐之由而順之無不愈也咳嗽肺主氣肺為邪所幹氣逆而不下故令人咳嗽有肺寒而咳有停飲而咳有邪在半表半裡而咳治各不同其水咳三症不可不辨小青龍湯太陽之表水也十棗湯太陽之裡水也真武湯少陰之水氣也喘喘者氣逆而上行沖沖而氣急喝喝而息數張口抬肩搖身掀肚者是也有邪在表而喘有邪在裡而喘有水氣之喘在表者因太陽表邪未解所致必心腹滿而不堅治宜發散在裡者因陽明內實失下而致必心腹脹滿治宜攻下指掌賦云微喘緣表之未解喘滿而不惡寒者當下而痊若飲水過多水氣泛溢而喘必心下怔忡治宜行水若身汗如油喘而不休又為絶候嘔吐附乾嘔嘔者聲物俱有而漸出吐者無聲有物而頓出較其輕重嘔甚於吐也若有聲無物為乾嘔也蓋因表邪傳裡裡氣上逆則為嘔也大抵傷寒嘔吐多屬半表半裡間有胃熱而嘔吐者經曰嘔多雖有陽明症不可攻之為氣逆未收斂為實也若胃熱而嘔吐者脈弦數口燥渴是也胃寒而嘔吐者脈弦遲逆冷是也水氣而嘔吐者先渴後嘔膈間怔忡是也膿血而嘔吐者喉中腥腥血逆上衝是也又有所謂乾嘔者蓋因邪熱在胃脘熱氣與穀氣相併逆上衝胸故有此症大率與嘔吐治法不遠若太陽汗出而乾嘔桂枝湯主自汗也少陰下利而乾嘔薑附湯主下利也厥陰吐涎沫而乾嘔吳茱萸湯主涎沫也邪去則嘔自止矣又有水氣之症當以表裡別之悸悸者心中築築然動而不能自安即名怔忡此屬心心虛故築然而動若人捕焉然悸症有九其治法惟三一曰氣虛因發表太過氣衰神弱心虛不能自持二曰水停心下水氣乘心心火畏水不能安三曰汗為心液汗之過多液去心空無所倚依各從症治或養神或補氣或溫經分水可也振振者聳然動搖者是也蓋汗吐下太過使氣血虛而作傷寒振者責其虛寒至於欲汗之時其人素虛必蒸蒸而振卻發熱汗出而解振近戰者也而輕者為振矣戰則正與邪爭爭則鼓栗而戰振則虛而不至爭故止聳動而振也下後復發汗者振寒謂其表裡俱虛也血家發汗寒栗而振者謂其氣血俱虛也諸如此者都是振聳耳茲若振振欲劈地有聲為振搖二者皆發汗過多之陽經虛不能主持身為振搖也非振栗之比皆用溫經助陽滋血益氣之劑一説氣血俱虛不能營養筋骨身不能主持故為振搖也須大補氣血曾用人參養營湯數服甚效有一人身搖不得眠以十味溫膽湯倍用人參得效戰栗戰栗者陰陽相爭肢體振動是也經曰戰者身為之戰搖栗則心戰是也形雖相似實非一也既分為二更有內外之別焉戰者外也屬陽栗者內也屬陰邪氣外與正氣爭則為戰戰其愈者也邪氣內與正氣爭則為栗栗為甚者也戰者正氣盛栗者邪氣勝也一云戰之與振振輕而戰重也戰之與栗戰外而栗內也昧者通以為戰栗非也傷寒六七日欲解時必發戰而汗解也戰則正氣勝故得汗而解粟則不戰而但心戰搖頭鼓頷遂成寒逆此陰氣內勝正氣虛極不能勝邪宜薑附四逆湯以救之故經曰陰中於邪內必栗也正氣內實邪不能爭則便汗出而不發戰若邪氣欲出其人本虛邪與正爭則為振甚則為戰戰已發熱汗出而解矣若正不勝邪雖戰無汗為難治若至半日或至夜有汗亦解也七日或十四日或五日或十一日忽然身寒鼓頷戰栗急與薑米湯熱飲以助陽氣須臾戰止汗出而解矣短氣短氣者似喘非喘呼吸短促不相接續者是也然有為之實者有為之虛者有在表者有在裡者之不同經曰趺陽脈微而緊緊為寒微為虛微緊相搏則為短氣金匱要略云短氣不足以息者為實大抵心腹脹滿而短氣邪在裡而為之實心腹濡滿而短氣邪在表而為之虛又有水停心下亦令短氣渴附舌乾口燥渴者裡熱也津液為熱所耗故令渴也傷寒傳至厥陰則為消渴謂飲水多而小便少也經曰脈浮而渴屬太陽小青龍湯去半夏加花粉有汗而渴屬陽明白虎湯加人參便實者宜下之自利而渴屬少陰承氣湯主之至於厥陰則熱之極矣俱宜下之大抵胃實熱甚而渴當損其有餘胃虛陰火上浮而渴當補其不足太陽症無汗而渴者不可與白虎陽明症汗多而渴者不可與五苓至若六七日渴欲得水此為欲愈宜少與之若汗下過多耗奪津液亦令口渴又有所謂舌乾口燥者蓋因邪熱聚胃消耗津液胃汁干也宜調胃承氣湯少陰舌乾口燥此內外枯極熱消腎汁宜急下之若汗下過多津液衰少或病方瘥血氣尚虛以致心火下降腎水不升而口燥咽乾者宜滋陰養氣之劑發黃經曰濕熱相交民多病疸疸者單陽而無陰也蓋因當汗不汗當下不下當利小便不利小便所致也太陰脾土濕熱相蒸色見於外必發身黃若濕氣勝則如熏黃而晦一身盡痛乃濕病也熱氣勝則如橘黃而明一身不痛乃黃病也傷寒至此熱勢已極且與蓄血症大抵相類若小便不利大便實為發黃小便自利大便黑為蓄血也發黃宜通利小便分導其氣流行其濕可也故曰治濕不利小便非其治也茲若形體煙薰環口黧黑柔汗發黃又為脾絶而不可治也發狂經曰重陽者狂重陰者癲又曰邪入於陽則狂邪入於陰則癲又曰陽邪並於陽則狂陰邪並於陰則癲又曰熱毒在胃併入於心使神不寧而志不定遂發狂也蓋因陽症失汗使陽熱入深又失下使陽氣重盛陰氣暴絶獨陽而無陰者也始則少臥頻起妄語妄笑甚則登高而歌棄衣而走逾垣上屋熱莫可遏治宜寒涼之劑勝之傷寒至於發狂邪熱至極非大吐不能已也若手足和暖神氣清爽脈息洪大目睛光彩此為可治若反目直視四肢厥冷六脈沉微狂言不食此為必死凡發狂奔走勢不可遏須置火盆於病人處用醋一碗傾於火炭上令其氣衝入病人鼻內仍將薑汁噴其頭面身體手足即安方可察其陽狂陰躁而施治療凡熱病發狂切不可掩閉床帳須要揭開候爽氣良久遂用銅鏡按在心胸間俟熱勢稍退即除若熱太盛燥渴不止將硝一斤研細以水一盆用青布三五塊浸於硝水中微攪半乾搭在病人胸膛並心上頻頻易之如得睡汗乃愈如狂如狂者勢緩而尚能阻擋非若發狂勢凶而不能抵禦者也惟起臥不安未至於狂耳經曰熱結膀胱其人如狂此蓄血症也治以抵當湯或桃仁承氣湯驚狂驚狂乃亡陽驚惕之狂非若重陽奔走之狂也蓋因陽邪在表發汗再之而汗不行以致津液內竭正氣耗散或置火床榻之下或燒針灼艾劫奪取汗變為此症所以倏然而起惕然而動精神耗亂肢體不寧實者煩躁不已虛者真陽脫亡法當柴芩以劫熱龍牡以收神又當視其虛實而酌法之陰躁陰症而發躁者亦如發狂狀實非狂也其病初起無頭疼但躁煩欲坐泥水井中或欲陰涼處坐躁亂不安此陰極發躁者也但手足逆冷脈沉細雖煩渴不能飲水者為異也用霹靂散治之更須冷服甚則身發微熱面赤戴陽足冷煩躁脈數無力乃里寒下虛虛陽伏陰所致宜人參四逆湯冷服俗醫乃以面赤身熱而誤作陽狂實熱反成大害者有之矣須用涼水半盞試之入口即吐出而不納者是也又須詳脈脈來有力無力者此為良法發斑發斑者蓋因傷寒當下失下邪熱蘊蓄於胃而致不當下而下早邪熱乘虛入胃又有陽症誤服熱藥者熱極焦腐而致若汗下後熱不解足冷耳聾煩悶欲嘔便是發斑之症然斑症有二一曰溫毒發斑二曰熱病發斑皆邪熱傷血血熱不散發於皮膚輕為癮疹重為錦紋也俱用化斑湯主之切不可發汗汗則重令開泄更增斑斕也大抵身溫足暖脈洪數者為順身涼足冷脈微細者為逆如紅潤起發者吉稠密成片者凶微者赤斑五死一生甚者黑斑十死一生夫斑之方萌與蚊迹相似然發斑多見胸腹蚊迹只見於手足又脈來洪大其人昏憒先紅後赤者斑也脈不洪大病人自靜先紅後黃者蚊迹也霍亂經曰有發熱頭疼身痛惡寒而吐利兼作者此屬何病答曰此名霍亂是也然有乾霍亂濕霍亂之異濕霍亂者上吐下利所傷之物得以盡出而自愈矣乾霍亂者上不得吐下不得利物不能泄出擁閉邪氣關隔陰陽煩擾悶亂絞腸腹痛而死矣大抵傷寒吐利邪氣所傷雜病吐利飲食所傷鳴呼飲食有節起居有常豈能霍亂耶飲食自倍腸胃乃傷喪身之由實自致耳鄭聲鄭聲者聲如鄭衛之音不能正也孔子曰惡鄭聲之亂雅樂也經曰虛則鄭聲蓋因汗下過多表裡虛竭以致陽脫陰勝其人正氣衰而本音失精神奪而語句重手足並冷神昏舌短音響糊塗與譫語迥不相同此症十無一治不得已姑用獨參湯或白通湯讝語讝語者謂呢喃而語又作譫語謂妄有所見而言也皆由真氣昏亂神識不清之所致也又曰表邪不散陷入於胃胃中熱盛上乘於心心為熱冒則神氣昏亂妄有所見而言也輕則睡中呢喃重則不睡亦語有錯語有獨語有狂語有語言不休有語言舛亂者之不同各以見熱之輕重也大抵熱入於胃水涸糞燥必發譫語經曰邪氣盛則實實則譫語動氣動氣者築築然跳動者是也蓋因其人素有積氣偶感傷寒醫者妄施汗吐下法致動其氣隨臟所主而見於臍之左右上下是皆真氣不足動及當臍者以脾為中州發汗吐下先動脾氣故不待言之也故真氣內虛臟氣不治慎不可汗下也又有腎臟之氣內虛水結不散氣與水搏即發奔豚通宜理中去朮加桂以術能燥腎水而閉氣桂能泄奔豚故也瘛瘲瘛者筋脈急也瘲者筋脈緩也急則引而縮緩則縱而伸或伸動而不止名曰瘛瘲俗謂之搐是也然瘛瘲者風痰也故癲癇則瘛瘲焉傷寒瘛瘲者皆由汗下之後脾土受傷肝木時旺肺金不能制之是以木生火火生熱熱生風風火交煽則手足動搖而搐搦也傷寒至此可謂危矣治須平木降火佐以和血脈祛風痰之劑倘勢稍減症可治也鬱冒郁者為鬱結而氣不舒冒者為昏冒而神不清世謂之昏迷者是也經曰諸虛乘寒則為鬱冒不仁又曰冒家汗出自愈由此觀之鬱冒為虛寒可知矣若少陰病下利而頭眩時時自冒者又為死證謂其虛極而脫也觀其若是幸毋忽焉自利自利者不經攻下而自然泄瀉者是也然有協熱協寒之別須當明辨之夫協熱者即表邪傳裡裡虛協熱而自下利者是也又有不應下而誤攻之內虛協熱亦為下利者是也協寒者即三陰經病協熱利者臍下必熱渴欲飲水泄下黃赤發熱後重脈數者是也協寒利者臍下必寒自利不渴泄下清穀脈微惡寒者是也蓋傷寒自利多種須識陰陽二字如三陽下利則身熱太陰下利則手足溫少陰厥陰下利則身涼無熱此確論也大抵傷寒下利挾太陽脈證便不得用溫藥俗醫但見下利便作陰症而用溫熱之藥其不發黃生斑也幾希至若下利而有頭疼腰痛肌熱目疼鼻乾脈長者是也此太陽陽明合病葛根湯主之若下利而有頭疼胸滿口苦咽乾或往來寒熱脈弦而嘔者此太陽少陽合病也柴苓湯主之若下利而有身熱脅痛往來寒熱或乾嘔脈弦而長者此陽明少陽合病承氣湯主之若脈不弦者順脈弦者逆也若風邪入胃木來侮土故令暴下其治法或溫或攻或清下焦或利小便切不可發汗耳設或下利而發熱下利而厥逆下利而肺實下利而煩躁不得眠皆不可治也傷寒下利十有六七俗人不識呼為漏底遽用溫燥止澀之劑以助邪變為危症深可哀憫不大便不大便謂大便不通蓋因熱蓄於胃胃土燥裂津液潰耗以致大便不通若見發渴譫語潮熱自汗脈實脹滿等證宜三承氣湯選用若以下後或發汗後而大便仍不通者此津液內竭宜用蜜導或豬膽導法若帶嘔者未全入府雖有陽明症不可攻之若小便清者知邪不在裡而仍在表亦不可攻之若瘥後食早胃氣不能運行而不便分輕重以消導之若病後血少腸胃燥澀而不便者又分老壯以滋潤之小便自利太陽症下焦有熱小腹必滿應小便不利今反利者血症諦也抵當湯主之陽明症自汗出復發汗應小便少今反利者津液內竭也屎雖硬不可攻之宜蜜導法少陰症而小便利者虛寒症也四逆湯主之小便不利膀胱乃津液之府氣化則能出焉若熱蓄於下濕蘊於中氣因熱傷結而不散甚則小腹硬滿而痛小便閉而不通也若飲水過多或中濕發黃皆以利小便為先如汗後亡津液陽明汗多則以利小便為戒小便難經曰陰虛則小便難陰虛者陽必湊之蓋因膀胱受熱故小便澀而不能流利小便數小便數者腎與膀胱俱虛而有客熱乘之也二經既虛致受客熱虛則不能制水故令數小便數則水行澀澀則小便不快故令數四逆附厥四逆者四肢逆而不溫也厥者手足寒冷甚於四逆也節庵曰邪在表則手足熱邪在半表半裡則手足溫邪在陰經則手足逆冷然自熱至溫至溫至冷此傳經之邪也輕則四逆散重則承氣湯若乃直中陰經之邪初得病便手足厥冷輕則理中湯重則四逆湯陽厥初有頭痛身疼發熱惡寒喜冷便祕譫語露手揚衣發渴脈沉數者承氣湯陰厥初無頭疼身熱惟怕寒戰栗倦臥欲眠下利清穀引衣自蓋脈沉遲者四逆湯按四逆散方用柴胡枳實芍藥甘草皆寒冷之物而治四逆之疾是知傳經之邪非虛寒症也故忌用溫熱之劑今將傳經直中兩症分作陰厥陽厥則四逆與厥判然分明矣蓄血蓄血者瘀血蓄結於內也蓋因邪熱相攻血留不行故成此症也經曰太陽隨經瘀血在裡血為熱搏結而不行蓄於下焦所致也然血蓄於上則善忘血蓄於下則為如狂若少腹急滿小便當不利今反利而大便黑者血症諦也宜用鹹寒苦泄勝血之劑或抵當湯之類若小便不利津液留結可利其小便若小便自利則是蓄血之症可下其瘀血也遺溺膀胱不利為癃不約為遺溺若腎虛則膀胱之氣不約故小便出而不自知也其治法有陰陽虛實之別若陽邪譫妄神昏熱甚而遺尿者當清心解熱若陰邪厥逆脈微寒極而遺尿者當溫腎散寒設或狂言直視而遺尿者又為腎絶而不可治也搖頭頭者諸陽之會諸陽脈皆上於頭陽脈不治則頭為之搖矣然搖有三一曰搖頭言者里痛也以里有痛語言則劇欲言而頭搖矣二曰獨頭搖卒口噤背反張者痙病以風盛於上風主動搖故頭搖也然里病非邪病也痛使之然痙病非厥逆也風使之然至於陽反獨留形體如煙燻直視而搖頭者又為心絶也怫鬱怫鬱者蓋因表邪發熱汗出覆蓋不周汗出不徹或早遏風邪是以陽氣鬱於肌膚蒸於頭面聚而不散也若陰盛而面赤者其色黯而不光陽盛而面赤者其色明而且潤治須察其虛實不可見面紅便作陽火治之藏厥傷寒七八日脈微膚冷煩躁無時暫安者此名藏厥多難治始當用四逆湯除中傷寒厥深下利脈遲當不能食而反能食者名曰除中除中者中氣已絶病不可治也不仁不仁者肌膚頑麻而不知痛癢寒熱也蓋因發汗過多亡其營血不能周流經絡乃為寒邪輳襲血脈凝泣而不仁也設或身汗如油喘而不休水漿不入形體不仁又為絶候也直視直視者視物而目睛不轉動者是也傷寒至於直視為邪氣已極證候已逆多難治也設或目中不了了者又為可治之症也二者形症相近為工者宜熟思之筋惕肉瞤內經曰陽氣者精則養神柔則養筋發汗過多津液枯少陽氣大虛筋肉失養故惕然而跳瞤然而動也治宜溫經養營之劑故張氏特設真武湯以救之熱入血室王冰曰沖為血室言諸經之血朝會於此其脈起於腎下並足陽明之經若衝脈得熱血必妄行故在男子則為下血譫語以邪熱傳入正陽明府病也在婦人則為寒熱似瘧以邪熱乃隨經而入也故曰婦人則隨經而入男子由陽明而傳一説傷寒中風偶遇經水適來邪隨而入或經水適斷血熱而結或胸滿譫語或往來寒熱或如瘧狀皆為熱入血室也皆不可汗下無犯胃氣及中上二焦並用小柴胡湯加歸芍生地丹皮以治之吐蛔吐蛔者蓋因傷寒胃虛之人素有積冷妄發其汗以致胃中虛冷飢不欲食食即吐蛔也先用理中湯次用烏梅丸待蛔已定而熱不退或嘔惡脈數者方用小柴胡湯此症身雖躁熱口雖燥渴忌用寒涼狐惑狐惑者猶豫不決進退之義也蓋傷寒失汗邪熱入腹以致飲食少而腸胃空虛三蟲舉而求食其候四肢沉重精神困倦惡聞食氣默默欲臥目閉舌白齒晦面眉間赤白黑色變易無常然蟲蝕下部為狐下唇有瘡其咽乾蟲蝕其藏為惑上唇有瘡其聲啞通用治𧈟桃仁湯漱水不下咽漱水不下咽有三若見表症而不下咽者必作衄以邪熱在經迫血妄行也若無表症加之腹滿如狂此為瘀血停留也若陰極發躁渴欲飲水水入即吐此無根之火遊於咽嗌之間假作渴也若能盡飲不解渴而睡臥不寧者此實火作渴也飢不欲食飢不欲食者由胃氣虛客熱在胸中所致也宜吐之仲景曰手足冷脈乍緊心煩飢不欲食病在胸宜瓜蒂散吐之過經不解傷寒六日傳六經為一候七日當解若不解再傳至十三日謂之過經然去傷寒之邪不過汗吐下三法三法得當則隨手而愈矣若當汗失汗則邪熱內陷當下失下則邪熱留滯傳變不已過經而不解也亦有汗吐下後藥力欠至邪氣未盡宿垢凝結於腸胃餘毒壅窒於經絡亦致過經而不解也大法虛者視輕重而調養之實者量怯弱而再下之百合病傷寒病後失於調理餘邪未盡陰陽錯攻當汗反下當下反汗以致為逆邪不能解故為百脈一宗舉皆受病無復經絡傳次所以欲食不食欲臥不臥欲行不行似寒無寒似熱無熱默默不知口苦便赤藥入口即吐利愈劇如有邪崇其脈微數此為百合病故用百合等湯若溺時頭痛六十日愈溺時頭不痛淅然寒者四十日愈若溺快然而頭眩者二十日愈壞病傷寒邪未盡又感風寒暑濕燥火而成壞病或汗吐下溫針仍不解或小柴胡證罷而熱尚在亦為壞病蓋病已過經熱留臟腑陰陽壞亂日久不痊氣血漸衰變為此症視其何逆以法治之勞復勞為勞動之勞復為再病之復也蓋因傷寒新瘥血氣未平餘熱未淨勞動其熱熱氣還經遂復熱也非止強力搖體持重遠行至於梳頭洗面憂悲思慮皆能復也況其過用者乎其飲食復者乃曰多食過食內滯則復餘邪因食滯而復聚也又曰食谷則危飲酒則劇經曰傷寒瘥後更發熱者小柴胡湯和之脈浮數者以汗解之脈沉實者以下解之然傷寒之邪自外入也勞復之邪自內發也鳴呼食復也勞復也諸復可治而御內則死矣昔顧子獻不以華敷之診為信臨死致有舌出數寸之驗由此觀之可不駭哉易病易病者乃陰陽交易之謂也蓋大病方瘥餘邪未淨輒動淫欲毒氣返遏互相為病也若男病新瘥婦人與之交而反得病者謂之陽易婦病新瘥男子與之交而得病者謂之陰易若不因易而自病重舉者名曰女勞復通用逍遙散加減在男子則陰腫少腹絞痛在婦人則裡急腰胯重連腹內掣痛其症熱上衝胸氣乏身重頭重不舉足不能移眼中生花四肢拘急百節解散男子卵縮入腹婦人痛引陰中俱用燒裩散或豭鼠糞竹皮等散待小便利陰頭腫退為愈若手足拳攣舌吐而脈離經者又為不治之症也發頤傷寒汗下不徹邪結在耳後一寸二分或兩耳下俱腫硬者名曰發頤此皆餘邪熱毒不清速宜消散緩則腫潰矣宜連翹敗毒散厥夫陽氣衰於下則為寒厥陰氣衰於下則為熱厥經云陽氣起於足五指之表陽脈集於足下而聚於足心故陽氣勝則足下熱陰氣起於足五指之裡陰脈集於膝下而聚於足心故陰氣勝則從足五指至膝上寒其他傷寒時疫熱極入深手足厥冷者所謂熱深厥亦深陽極似陰也若誤認為寒而用熱藥則殺人於俄頃矣宜承氣湯白虎湯大柴胡湯若真是陰寒而厥者則宜附子理中湯陰衰熱厥宜滋陰以制火又有火鬱脾土之中手足熱甚者東垣升陽散火湯所由設也疝疝氣者睪丸連少腹急痛有痛在睪丸者有在五樞穴者皆足厥陰經也按經云任脈為病男子內結七疝則諸經之疝無不以任脈為原矣七疝者沖狐㿗厥瘕㿉癃寒則多痛熱則多腫濕則腫墜虛亦腫氣分多動血分不移在左丸屬寒在右丸屬氣痛少腫多後人謂七疝者筋水狐㿗氣血寒

front:
  text: 吳序醫書自靈素傷寒金匱外歷代名賢著述汗牛充棟求其能續軒岐一脈繼往開來有益於世者余未數覯何也蓋其故有二一則泥古不化隨文敷衍辭多害義致使先聖片言舉要一隅三反之旨晦而難明後學反因之而有他歧之惑一則師心自用妄詡聰明好奇好僻以無稽之言迷惑後世自欺欺人流毒無窮故書愈多理愈晦遂成千古絶傳之學深可憫焉我朝廓清寰宇軫念民瘼爰採海內遺書刪繁訂誤去偽存真御製金鑑一書頒示天下集醫學之大成豫生民以多福從此山陬海澨莫不引繩削墨學有指歸名賢輩出群登仁壽皆聖天子深仁厚澤所致也吾吳葉天士先生當時為十全之醫四方求治者戶履常盈惜著作甚少雖有指南一書行世然總以未窺全豹為憾余自留心斯道訪求先生遺編往來胸中者已二十餘年矣辛卯春同門徐子雪香過草堂談及先業師翁春岩有抄藏先生醫效祕傳三卷余聞之而喜急索徐子副本讀之前二卷辨別傷寒後一卷摘擇經旨申明脈要法取應驗理貴簡明不泥古不好奇真如月印千潭只是一月非學有本原何能臻此因與同志者重為校讎付諸梨棗以廣其傳讀是書者勿以平易近情而忽之其妙正在平易近情中也道光辛卯夏四月笠澤後學吳金壽撰張序醫之事豈易言哉非討論而悉其源無以施臨症之功非臨症而著其效無以驗討論之力二者未至不足以言醫也吾吳從事斯而以神明稱者輩出其能實從讀書閲歷中本心得以立言啓後者必首推天士葉先生而薛生白繆方彥兩先生亦後先輝映焉吳子金壽從余學醫究心有年出以應世亦能得心應手茲持其彙刊葉氏醫效祕傳暨葉薛繆三家醫案視余披閲之以其論證其方靡不吻合即薛繆兩家亦往往與之同條而共貫宜當時受三先生十全之功甚博至今猶負重名也凡從事斯者誠能即此探其論以立體究其方以妙用不特往哲立言啓後之心賴吳子以廣布而吾吳醫道繼起而擅神明之技者將從此踵相接也余故樂得而為之序道光十一年四月仙誕日友樵張文燮書時年七十有七
